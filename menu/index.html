<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เมนูอาหาร — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css?v=20260612b">
<style>
  /* ── ธีม editorial ร่วม (phero + dhead + chips) ── */
  .phero { position: relative; height: clamp(260px, 46vh, 520px); }
  .phero__media { position: absolute; inset: 0; overflow: hidden; background: var(--color-line); }
  .phero__media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .phero__media::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(30,18,8,0.2) 0%, rgba(30,18,8,0.06) 55%, rgba(30,18,8,0.22) 100%);
  }
  .phero__wordmark {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    transform: translateY(44%);
    z-index: 2;
    text-align: center;
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(48px, 11.5vw, 180px);
    line-height: 0.74;
    letter-spacing: 0.05em;
    color: var(--color-cream);
    pointer-events: none;
    user-select: none;
  }
  .dhead__en {
    font-family: var(--font-serif);
    font-size: clamp(2.1rem, 4.8vw, 3.6rem);
    font-weight: 400;
    line-height: 1.04;
    letter-spacing: 0.5px;
    color: var(--color-text);
    margin: 0;
  }
  .dhead__en em { font-style: italic; }
  .dhead__th {
    font-family: var(--font-sans);
    font-size: clamp(0.95rem, 1.6vw, 1.1rem);
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--color-text-muted);
    margin: 12px 0 0;
  }
  .pintro {
    max-width: 1240px;
    margin: 0 auto;
    padding: clamp(76px, 10vw, 150px) clamp(20px, 5vw, 64px) clamp(30px, 4vw, 52px);
  }
  .pintro__body {
    max-width: 600px;
    margin: clamp(20px, 3vw, 32px) 0 0;
    color: var(--color-text-muted);
    line-height: 1.95;
    font-size: 0.95rem;
  }
  .pintro__body p { margin: 0; }
  .section .container { max-width: 1240px; padding: 0 clamp(20px, 5vw, 64px); }
  .chip { border-radius: 0; letter-spacing: 1px; font-size: 0.8rem; padding: 9px 16px; background: transparent; }

  /* featured banner — flat */
  .featured { border-radius: 0; box-shadow: none; background: var(--color-cream-warm); }
  .featured__eyebrow { letter-spacing: 2.5px; font-size: 0.74rem; }

  .set-card {
    background: transparent;
    border: 1px solid var(--color-line);
    border-radius: 0;
    padding: 20px 24px;
    margin-bottom: -1px;
  }
  .set-card__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--color-line);
  }
  .set-card__head h3 { margin: 0 0 4px; }
  .set-card__price {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    color: var(--color-gold-dark);
    white-space: nowrap;
  }
  .set-card__desc { color: var(--color-text-muted); font-size: 0.9rem; margin: 0; }
  .selection-block {
    background: var(--color-cream);
    border-left: 2px solid var(--color-gold-light);
    border-radius: 0;
    padding: 14px 16px;
    margin-top: 10px;
  }
  .selection-block h4 {
    margin: 0 0 6px;
    color: var(--color-brown-dark);
    font-size: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .selection-block h4 small {
    background: transparent;
    border: 1px solid var(--color-gold);
    color: var(--color-gold-dark);
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .selection-block .opts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .selection-block .opt {
    background: transparent;
    border: 1px solid var(--color-line);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 0.85rem;
    color: var(--color-text);
  }
  .selection-block .sub-cat {
    margin-top: 8px;
  }
  .selection-block .sub-cat-name {
    font-weight: 600;
    color: var(--color-gold-dark);
    margin-bottom: 4px;
    font-size: 0.85rem;
  }
  .item-list {
    margin: 8px 0 0;
    padding: 0;
    list-style: none;
  }
  .item-list li {
    padding: 5px 0 5px 22px;
    position: relative;
    font-size: 0.92rem;
    color: var(--color-text);
    border-bottom: 1px dashed var(--color-line);
  }
  .item-list li::before {
    content: "•";
    position: absolute;
    left: 6px;
    color: var(--color-gold);
    font-size: 1.2rem;
    top: 4px;
  }
  .item-list li:last-child { border-bottom: none; }

  /* ─── Menu mini-gallery strip ─── */
  .menu-gallery-strip {
    margin-bottom: 28px;
    position: relative;
  }
  .menu-gallery-strip__track {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 6px;
  }
  .menu-gallery-strip__track::-webkit-scrollbar { display: none; }
  .gallery-strip-hint {
    font-size: 0.78rem;
    color: var(--color-text-muted);
    margin: 0 0 6px;
    display: none; /* hidden on mobile */
  }
  @media (hover: hover) and (pointer: fine) {
    /* desktop/mouse only */
    .gallery-strip-hint { display: block; }
  }
  .menu-gallery-strip__item {
    flex: 0 0 220px;
    height: 150px;
    border-radius: 0;
    overflow: hidden;
    scroll-snap-align: start;
    cursor: pointer;
    position: relative;
  }
  @media (min-width: 640px) {
    .menu-gallery-strip__item { flex: 0 0 280px; height: 190px; }
  }
  .menu-gallery-strip__item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .menu-gallery-strip__item:hover img { transform: scale(1.04); }
  .menu-gallery-strip__caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(0deg, rgba(62,45,32,0.72) 0%, transparent 100%);
    color: #fff; font-size: 0.78rem;
    padding: 8px 10px 7px;
    opacity: 0; transition: opacity 0.2s;
  }
  .menu-gallery-strip__item:hover .menu-gallery-strip__caption { opacity: 1; }
</style>
</head>
<body>

<div id="nav-mount"></div>

<!-- PAGE HERO -->
<section class="phero">
  <div class="phero__media"><img id="pheroImg" alt="เมนูอาหาร"></div>
  <div class="phero__wordmark" aria-hidden="true">CUISINE</div>
</section>

<!-- INTRO -->
<section class="pintro">
  <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span> เมนูอาหาร</div>
  <h2 class="dhead__en"><em>Cuisine</em></h2>
  <p class="dhead__th">เมนูอาหาร</p>
  <div class="pintro__body">
    <p>บุฟเฟต์ · โต๊ะจีน · โต๊ะจันทร์ — เลือกชม Set รายละเอียดและรายการอาหาร</p>
  </div>
</section>

<section class="section" style="padding-top: 0;">
  <div class="container">
    <div class="gallery-filters" id="typeChips"></div>

    <div id="menuMount"></div>
  </div>
</section>

<div class="lightbox" id="menuLightbox">
  <button class="lightbox__close" onclick="document.getElementById('menuLightbox').classList.remove('open')">×</button>
  <img id="menuLightboxImg" alt="">
</div>

<div id="footer-mount"></div>

<script src="../js/common.js?v=20260612b"></script>
<script>
(async function() {
  const data = await CW.mountChrome('menu');
  if (!data) return;
  const menus = data.menus || {};
  const types = Object.keys(menus);
  let active = CW.qs('type') && menus[CW.qs('type')] ? CW.qs('type') : types[0];
  if (menus[active]?.image) document.getElementById('pheroImg').src = menus[active].image;

  const chipsEl = document.getElementById('typeChips');
  chipsEl.innerHTML = types.map(t => `
    <button class="chip ${t === active ? 'active' : ''}" data-type="${t}">
      ${menus[t].icon || ''} ${CW.escape(menus[t].name)}
    </button>
  `).join('');
  chipsEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      active = b.dataset.type;
      chipsEl.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });

  function priceLabel(set) {
    if (set.pricePerPerson != null && set.pricePerPerson > 0) return CW.fmtBaht(set.pricePerPerson) + ' / ท่าน';
    if (set.pricePerTable != null && set.pricePerTable > 0) return '+ ' + CW.fmtBaht(set.pricePerTable) + ' / โต๊ะ';
    return 'รวมในแพ็คเกจ';
  }

  function renderSet(s) {
    let body = '';
    if (s.selections && s.selections.length) {
      body = s.selections.map(sel => {
        let inner = '';
        if (sel.subCategories && sel.subCategories.length) {
          inner = sel.subCategories.map(sc => `
            <div class="sub-cat">
              <div class="sub-cat-name">${CW.escape(sc.name)}</div>
              <div class="opts">${sc.items.map(i => `<span class="opt">${CW.escape(i)}</span>`).join('')}</div>
            </div>
          `).join('');
        } else if (sel.options) {
          inner = `<div class="opts">${sel.options.map(o => `<span class="opt">${CW.escape(o)}</span>`).join('')}</div>`;
        }
        return `
          <div class="selection-block">
            <h4>${CW.escape(sel.category)} <small>เลือก ${sel.pickCount}</small></h4>
            ${inner}
          </div>`;
      }).join('');
    } else if (s.items && s.items.length) {
      body = `<ul class="item-list">${s.items.map(i => `<li>${CW.escape(i)}</li>`).join('')}</ul>`;
    }
    return `
      <div class="set-card">
        <div class="set-card__head">
          <div style="flex:1;min-width:200px;">
            <h3>${CW.escape(s.name)}</h3>
            <p class="set-card__desc">${CW.escape(s.description || '')}</p>
          </div>
          <div class="set-card__price">${priceLabel(s)}</div>
        </div>
        ${body}
      </div>
    `;
  }

  function buildGalleryStrip(m) {
    // Collect images: menu-level gallery[] first, then each set's image
    const imgs = [];
    (m.gallery || []).forEach(g => { if (g.url) imgs.push({ url: g.url, caption: g.caption || '' }); });
    (m.sets || []).forEach(s => { if (s.image) imgs.push({ url: s.image, caption: s.name || '' }); });
    if (!imgs.length) return '';
    const items = imgs.map(img => `
      <div class="menu-gallery-strip__item" data-url="${CW.escape(img.url)}">
        <img src="${CW.escape(img.url)}" alt="${CW.escape(img.caption)}" loading="lazy" style="${img.pos ? 'object-position:'+img.pos : ''}">
        <div class="menu-gallery-strip__caption">${CW.escape(img.caption)}</div>
      </div>
    `).join('');
    return `<div class="menu-gallery-strip">
      <p class="gallery-strip-hint">🖱 หากดูบนคอมพิวเตอร์ / PC โปรดใช้ลูกกลิ้งเมาส์เพื่อเลื่อนดูภาพ</p>
      <div class="menu-gallery-strip__track">${items}</div>
    </div>`;
  }

  function render() {
    const m = menus[active];
    if (!m) return;
    const mount = document.getElementById('menuMount');
    mount.innerHTML = `
      <div class="featured" style="margin-bottom:28px;">
        <div class="featured__img"><img src="${CW.escape(m.image)}" alt="${CW.escape(m.name)}" style="${CW.imgStyle(m)}"></div>
        <div class="featured__body">
          <span class="featured__eyebrow">${CW.escape(m.shortDescription || '')}</span>
          <h2 style="margin-top:8px;">${m.icon || ''} ${CW.escape(m.name)}</h2>
          <p style="color:var(--color-text-muted);">${CW.escape(m.description || '')}</p>
        </div>
      </div>

      ${buildGalleryStrip(m)}

      ${(m.sets || []).map(renderSet).join('')}
    `;
    // Wheel → horizontal scroll on desktop (mobile uses native touch swipe)
    mount.querySelectorAll('.menu-gallery-strip__track').forEach(track => {
      track.addEventListener('wheel', e => {
        if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return; // already horizontal
        e.preventDefault();
        track.scrollBy({ left: e.deltaY * 2, behavior: 'smooth' });
      }, { passive: false });
    });
    // Lightbox for gallery strip (skip if dragged)
    mount.querySelectorAll('.menu-gallery-strip__item').forEach(el => {
      el.addEventListener('click', () => {
        const lb = document.getElementById('menuLightbox');
        document.getElementById('menuLightboxImg').src = el.dataset.url;
        lb.classList.add('open');
      });
    });
  }
  render();
  document.getElementById('menuLightbox').addEventListener('click', (e) => {
    if (e.target.id === 'menuLightbox') e.currentTarget.classList.remove('open');
  });
})();
</script>

</body>
</html>
