<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เมนูอาหาร — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="nav-mount"></div>

<section class="section">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span> เมนูอาหาร</div>
    <div class="section-title">
      <span class="eyebrow">Cuisine</span>
      <h2>เมนูอาหาร</h2>
      <p class="text-center" style="color:var(--color-text-muted); max-width:640px; margin: 16px auto 0;">
        3 ประเภทอาหาร · บุฟเฟต์ · โต๊ะจีน · โต๊ะจันทร์ (อาหารไทย) เลือกชมรายการในแต่ละ Set
      </p>
    </div>

    <!-- Type chips -->
    <div class="gallery-filters" id="typeChips" style="justify-content:center;"></div>

    <!-- Menu content -->
    <div id="menuMount"></div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="../js/common.js"></script>
<script>
(async function() {
  const data = await CW.mountChrome('menu');
  if (!data) return;
  const menus = data.menus || {};
  const types = Object.keys(menus);
  let active = CW.qs('type') && menus[CW.qs('type')] ? CW.qs('type') : types[0];

  // Type chips
  const chipsEl = document.getElementById('typeChips');
  chipsEl.innerHTML = types.map(t => `
    <button class="chip ${t === active ? 'active' : ''}" data-type="${t}">
      ${menus[t].icon || ''} ${CW.escape(menus[t].name)}
    </button>
  `).join('');
  chipsEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      active = b.dataset.type;
      chipsEl.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });

  function render() {
    const m = menus[active];
    if (!m) return;
    const mount = document.getElementById('menuMount');
    const priceLabel = (set) => {
      if (set.pricePerPerson) return CW.fmtBaht(set.pricePerPerson) + ' / ท่าน';
      if (set.pricePerTable) return CW.fmtBaht(set.pricePerTable) + ' / โต๊ะ (' + (set.tableSize || 10) + ' ท่าน)';
      return '-';
    };

    mount.innerHTML = `
      <div class="featured" style="margin-bottom:48px;">
        <div class="featured__img"><img src="${CW.escape(m.image)}" alt="${CW.escape(m.name)}"></div>
        <div class="featured__body">
          <span class="featured__eyebrow">${CW.escape(m.shortDescription || '')}</span>
          <h2 style="margin-top:8px;">${m.icon || ''} ${CW.escape(m.name)}</h2>
          <p style="color:var(--color-text-muted);">${CW.escape(m.description || '')}</p>
        </div>
      </div>

      <h3 style="margin-bottom: 24px;">เลือก Set ที่สนใจ</h3>
      <div class="grid grid--auto">
        ${(m.sets || []).map(s => `
          <div class="card">
            <div class="card__img"><img src="${CW.escape(s.image)}" alt="${CW.escape(s.name)}"></div>
            <div class="card__body">
              <h3 class="card__title">${CW.escape(s.name)}</h3>
              <p class="card__subtitle">${CW.escape(s.description || '')}</p>
              <div class="card__price">${priceLabel(s)}</div>
              <details style="margin-top:16px;">
                <summary style="cursor:pointer;color:var(--color-gold-dark);font-weight:500;">ดูรายการอาหารใน Set นี้ (${(s.items || []).length} รายการ)</summary>
                <ul class="list-check" style="margin-top:12px;">
                  ${(s.items || []).map(i => `<li>${CW.escape(i)}</li>`).join('')}
                </ul>
              </details>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
  render();
})();
</script>

</body>
</html>
