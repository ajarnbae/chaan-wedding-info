<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รูปภาพสถานที่ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css?v=20260612b">
<style>
  /* ── ธีม editorial ร่วม (phero + dhead + chips) ── */
  .phero { position: relative; height: clamp(260px, 46vh, 520px); }
  .phero__media { position: absolute; inset: 0; overflow: hidden; background: var(--color-line); }
  .phero__media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .phero__media::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(30,18,8,0.2) 0%, rgba(30,18,8,0.06) 55%, rgba(30,18,8,0.22) 100%);
  }
  .phero__wordmark {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    transform: translateY(44%);
    z-index: 2;
    text-align: center;
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(48px, 11.5vw, 180px);
    line-height: 0.74;
    letter-spacing: 0.05em;
    color: var(--color-cream);
    pointer-events: none;
    user-select: none;
  }
  .dhead__en {
    font-family: var(--font-serif);
    font-size: clamp(2.1rem, 4.8vw, 3.6rem);
    font-weight: 400;
    line-height: 1.04;
    letter-spacing: 0.5px;
    color: var(--color-text);
    margin: 0;
  }
  .dhead__en em { font-style: italic; }
  .dhead__th {
    font-family: var(--font-sans);
    font-size: clamp(0.95rem, 1.6vw, 1.1rem);
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--color-text-muted);
    margin: 12px 0 0;
  }
  .pintro {
    max-width: 1240px;
    margin: 0 auto;
    padding: clamp(76px, 10vw, 150px) clamp(20px, 5vw, 64px) clamp(30px, 4vw, 52px);
  }
  .pintro__body {
    max-width: 600px;
    margin: clamp(20px, 3vw, 32px) 0 0;
    color: var(--color-text-muted);
    line-height: 1.95;
    font-size: 0.95rem;
  }
  .pintro__body p { margin: 0; }
  .section .container { max-width: 1240px; padding: 0 clamp(20px, 5vw, 64px); }
  .chip { border-radius: 0; letter-spacing: 1px; font-size: 0.8rem; padding: 9px 16px; background: transparent; }

  /* gallery grid — sharp + slow hover */
  .gallery-grid { gap: 10px; }
  @media (min-width: 640px) { .gallery-grid { gap: 14px; } }
  .photo { border-radius: 0; }
  .photo img { transition: transform 1s ease; }
  .photo:hover img { transform: scale(1.04); }
  .filter-label {
    margin: 18px 0 8px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 2.5px;
  }
</style>
</head>
<body>

<div id="nav-mount"></div>

<!-- PAGE HERO -->
<section class="phero">
  <div class="phero__media"><img id="pheroImg" alt="บรรยากาศสถานที่"></div>
  <div class="phero__wordmark" aria-hidden="true">GALLERY</div>
</section>

<!-- INTRO -->
<section class="pintro">
  <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span> รูปภาพสถานที่</div>
  <h2 class="dhead__en"><em>Gallery</em></h2>
  <p class="dhead__th">บรรยากาศสถานที่</p>
  <div class="pintro__body">
    <p>เลือกชมรูปภาพตามโซนและประเภทพิธี (เฉพาะพิธีที่มีรูปในโซนนั้นเท่านั้น)</p>
  </div>
</section>

<section class="section" style="padding-top: 0;">
  <div class="container">
    <!-- Zone filter -->
    <div class="filter-label">โซน</div>
    <div class="gallery-filters" id="zoneChips"></div>

    <!-- Ceremony filter -->
    <div class="filter-label">ประเภทพิธี</div>
    <div class="gallery-filters" id="ceremonyChips"></div>

    <div id="photoCount" style="color:var(--color-text-muted); font-size:0.9rem; margin-bottom:16px;"></div>

    <div id="galleryGrid" class="gallery-grid"></div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <button class="lightbox__close" onclick="document.getElementById('lightbox').classList.remove('open')">×</button>
  <img id="lightboxImg" alt="">
</div>

<div id="footer-mount"></div>

<script src="../js/common.js?v=20260612b"></script>
<script>
(async function() {
  const data = await CW.mountChrome('gallery');
  if (!data) return;
  const photos = data.gallery?.photos || [];
  if (photos[0]) document.getElementById('pheroImg').src = photos[0].url;
  const zones = data.gallery?.zones || [];
  const ceremonies = data.ceremonies || [];

  let activeZone = CW.qs('zone') || 'all';
  let activeCeremony = 'all';

  // Render zone chips
  const zoneChipsEl = document.getElementById('zoneChips');
  zoneChipsEl.innerHTML = `<button class="chip ${activeZone === 'all' ? 'active' : ''}" data-zone="all">ทุกโซน</button>` +
    zones.map(z => `<button class="chip ${activeZone === z.id ? 'active' : ''}" data-zone="${z.id}">${CW.escape(z.name)}</button>`).join('');
  zoneChipsEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      activeZone = b.dataset.zone;
      activeCeremony = 'all';
      zoneChipsEl.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      renderCeremonyChips();
      render();
    });
  });

  function renderCeremonyChips() {
    const ceremonyChipsEl = document.getElementById('ceremonyChips');
    // Find which ceremonies actually have photos in the active zone (or anywhere)
    const relevantPhotos = activeZone === 'all'
      ? photos
      : photos.filter(p => p.zone === activeZone);
    const ceremoniesWithPhotos = new Set(relevantPhotos.map(p => p.ceremony).filter(Boolean));

    // Only show ceremony chips that have at least 1 photo in this zone
    const availableCeremonies = ceremonies.filter(c => ceremoniesWithPhotos.has(c.id));

    if (availableCeremonies.length === 0) {
      ceremonyChipsEl.innerHTML = `<div style="color:var(--color-text-muted); font-size:0.85rem; padding: 4px 0;">ไม่มีรูปในโซนนี้</div>`;
      return;
    }

    ceremonyChipsEl.innerHTML = `<button class="chip ${activeCeremony === 'all' ? 'active' : ''}" data-ceremony="all">ทุกพิธี</button>` +
      availableCeremonies.map(c => `<button class="chip ${activeCeremony === c.id ? 'active' : ''}" data-ceremony="${c.id}">${CW.escape(c.name)}</button>`).join('');

    ceremonyChipsEl.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        activeCeremony = b.dataset.ceremony;
        ceremonyChipsEl.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
        render();
      });
    });
  }

  function ceremonyName(id) {
    return ceremonies.find(c => c.id === id)?.name || '';
  }
  function zoneName(id) {
    return zones.find(z => z.id === id)?.name || '';
  }

  function render() {
    const filtered = photos.filter(p => {
      if (activeZone !== 'all' && p.zone !== activeZone) return false;
      if (activeCeremony !== 'all' && p.ceremony !== activeCeremony) return false;
      return true;
    });
    document.getElementById('photoCount').textContent = `แสดง ${filtered.length} รูป`;
    const grid = document.getElementById('galleryGrid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">ไม่มีรูปในเงื่อนไขที่เลือก</div>`;
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <div class="photo" data-url="${CW.escape(p.url)}">
        <img src="${CW.escape(p.url)}" alt="${CW.escape(p.caption || '')}" loading="lazy" style="${CW.imgStyle(p)}">
        <div class="photo__cap">${CW.escape(p.caption || '')}${p.ceremony ? ' · ' + CW.escape(ceremonyName(p.ceremony)) : ''}</div>
      </div>
    `).join('');
    grid.querySelectorAll('.photo').forEach(el => {
      el.addEventListener('click', () => {
        document.getElementById('lightboxImg').src = el.dataset.url;
        document.getElementById('lightbox').classList.add('open');
      });
    });
  }

  renderCeremonyChips();
  render();

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') e.currentTarget.classList.remove('open');
  });
})();
</script>

</body>
</html>
