<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รูปภาพสถานที่ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="nav-mount"></div>

<section class="section">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span> รูปภาพสถานที่</div>
    <div class="section-title">
      <span class="eyebrow">Gallery</span>
      <h2>บรรยากาศสถานที่</h2>
      <p class="text-center" style="color:var(--color-text-muted); max-width:640px; margin: 16px auto 0;">
        เลือกชมรูปภาพตามโซนและประเภทพิธี (เฉพาะพิธีที่มีรูปในโซนนั้นเท่านั้น)
      </p>
    </div>

    <!-- Zone filter -->
    <div style="margin-bottom: 8px; font-size:0.85rem; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:1px;">โซน</div>
    <div class="gallery-filters" id="zoneChips"></div>

    <!-- Ceremony filter -->
    <div style="margin-bottom: 8px; font-size:0.85rem; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:1px;">ประเภทพิธี</div>
    <div class="gallery-filters" id="ceremonyChips"></div>

    <div id="photoCount" style="color:var(--color-text-muted); font-size:0.9rem; margin-bottom:16px;"></div>

    <div id="galleryGrid" class="gallery-grid"></div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <button class="lightbox__close" onclick="document.getElementById('lightbox').classList.remove('open')">×</button>
  <img id="lightboxImg" alt="">
</div>

<div id="footer-mount"></div>

<script src="../js/common.js"></script>
<script>
(async function() {
  const data = await CW.mountChrome('gallery');
  if (!data) return;
  const photos = data.gallery?.photos || [];
  const zones = data.gallery?.zones || [];
  const ceremonies = data.ceremonies || [];

  let activeZone = CW.qs('zone') || 'all';
  let activeCeremony = 'all';

  // Render zone chips
  const zoneChipsEl = document.getElementById('zoneChips');
  zoneChipsEl.innerHTML = `<button class="chip ${activeZone === 'all' ? 'active' : ''}" data-zone="all">ทุกโซน</button>` +
    zones.map(z => `<button class="chip ${activeZone === z.id ? 'active' : ''}" data-zone="${z.id}">${CW.escape(z.name)}</button>`).join('');
  zoneChipsEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      activeZone = b.dataset.zone;
      activeCeremony = 'all';
      zoneChipsEl.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      renderCeremonyChips();
      render();
    });
  });

  function renderCeremonyChips() {
    const ceremonyChipsEl = document.getElementById('ceremonyChips');
    // Find which ceremonies actually have photos in the active zone (or anywhere)
    const relevantPhotos = activeZone === 'all'
      ? photos
      : photos.filter(p => p.zone === activeZone);
    const ceremoniesWithPhotos = new Set(relevantPhotos.map(p => p.ceremony).filter(Boolean));

    // Only show ceremony chips that have at least 1 photo in this zone
    const availableCeremonies = ceremonies.filter(c => ceremoniesWithPhotos.has(c.id));

    if (availableCeremonies.length === 0) {
      ceremonyChipsEl.innerHTML = `<div style="color:var(--color-text-muted); font-size:0.85rem; padding: 4px 0;">ไม่มีรูปในโซนนี้</div>`;
      return;
    }

    ceremonyChipsEl.innerHTML = `<button class="chip ${activeCeremony === 'all' ? 'active' : ''}" data-ceremony="all">ทุกพิธี</button>` +
      availableCeremonies.map(c => `<button class="chip ${activeCeremony === c.id ? 'active' : ''}" data-ceremony="${c.id}">${CW.escape(c.name)}</button>`).join('');

    ceremonyChipsEl.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        activeCeremony = b.dataset.ceremony;
        ceremonyChipsEl.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
        render();
      });
    });
  }

  function ceremonyName(id) {
    return ceremonies.find(c => c.id === id)?.name || '';
  }
  function zoneName(id) {
    return zones.find(z => z.id === id)?.name || '';
  }

  function render() {
    const filtered = photos.filter(p => {
      if (activeZone !== 'all' && p.zone !== activeZone) return false;
      if (activeCeremony !== 'all' && p.ceremony !== activeCeremony) return false;
      return true;
    });
    document.getElementById('photoCount').textContent = `แสดง ${filtered.length} รูป`;
    const grid = document.getElementById('galleryGrid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">ไม่มีรูปในเงื่อนไขที่เลือก</div>`;
      return;
    }
    grid.innerHTML = filtered.map(p => `
      <div class="photo" data-url="${CW.escape(p.url)}">
        <img src="${CW.escape(p.url)}" alt="${CW.escape(p.caption || '')}" loading="lazy" style="${CW.imgStyle(p)}">
        <div class="photo__cap">${CW.escape(p.caption || '')}${p.ceremony ? ' · ' + CW.escape(ceremonyName(p.ceremony)) : ''}</div>
      </div>
    `).join('');
    grid.querySelectorAll('.photo').forEach(el => {
      el.addEventListener('click', () => {
        document.getElementById('lightboxImg').src = el.dataset.url;
        document.getElementById('lightbox').classList.add('open');
      });
    });
  }

  renderCeremonyChips();
  render();

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') e.currentTarget.classList.remove('open');
  });
})();
</script>

</body>
</html>
