<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายละเอียดแพ็คเกจ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="nav-mount"></div>

<div id="detailMount" class="loading" style="min-height: 60vh;">กำลังโหลดรายละเอียด...</div>

<div id="footer-mount"></div>

<script src="../js/common.js"></script>
<script>
(async function() {
  const data = await CW.mountChrome('packages');
  if (!data) return;

  const id = CW.qs('id');
  const all = [...(data.packages?.wedding || []), ...(data.packages?.seminar || [])];
  const pkg = all.find(p => p.id === id);
  const mount = document.getElementById('detailMount');

  if (!pkg) {
    mount.classList.remove('loading');
    mount.innerHTML = `
      <div class="container section">
        <div class="empty-state">ไม่พบแพ็คเกจที่คุณมองหา
          <div style="margin-top:16px"><a href="./" class="btn btn--ghost">← กลับหน้าแพ็คเกจ</a></div>
        </div>
      </div>`;
    return;
  }

  const cat = CW.findPackageCategory(data, pkg.id);
  const isWedding = cat === 'wedding';
  const allSlots = data.timeSlots?.[cat] || [];
  const slots = allSlots.filter(s => (pkg.availableTimeSlots || []).includes(s.id));

  let season = (cat === 'seminar') ? 'high' : (CW.qs('season') || CW.currentSeason(data.seasonInfo));
  let timeSlot = slots[0]?.id;
  let guestCount = '100';
  const removedRituals = new Set();

  // Build addon lookup from venueFees
  const addonMap = {};
  (data.venueFees?.addons || []).forEach(a => { addonMap[a.id] = a; });
  const pkgAddons = (pkg.availableAddons || []).map(id => addonMap[id]).filter(Boolean);

  mount.classList.remove('loading');
  mount.innerHTML = `
    <div class="detail-hero">
      <img src="${CW.escape(pkg.image)}" alt="${CW.escape(pkg.name)}">
      <div class="detail-hero__overlay">
        <div>
          <div class="eyebrow">${isWedding ? 'Wedding Package' : 'Seminar Package'}</div>
          <h1>${CW.escape(pkg.name)}</h1>
          <p style="margin-top:8px;opacity:0.95;">${CW.escape(pkg.subtitle || '')}</p>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="breadcrumb">
          <a href="../index.html">หน้าแรก</a> <span>/</span>
          <a href="./">แพ็คเกจ</a> <span>/</span>
          ${CW.escape(pkg.name)}
        </div>

        <div class="detail-grid">
          <!-- Main content -->
          <div>
            <div class="panel">
              <h3><span class="num">1</span> เกี่ยวกับแพ็คเกจ</h3>
              <p>${CW.escape(pkg.longDescription || pkg.shortDescription || '')}</p>
              ${pkg.notes ? `<div class="alert">${CW.escape(pkg.notes)}</div>` : ''}
            </div>

            <div class="panel">
              <h3><span class="num">2</span> สิ่งที่ได้รับในแพ็คเกจ</h3>
              <ul class="list-check">
                ${(pkg.includedItems || []).map(i => `<li>${CW.escape(i)}</li>`).join('')}
              </ul>
            </div>

            <div class="panel">
              <h3><span class="num">3</span> ช่วงเวลาที่จัดได้</h3>
              <p style="color:var(--color-text-muted); font-size:0.9rem;">เลือกช่วงเวลาในกล่องคำนวณราคา ราคาจะปรับตามช่วงเวลา</p>
              <div style="display:grid;grid-template-columns:1fr;gap:8px;">
                ${slots.map(s => `
                  <div style="background: var(--color-cream); padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid var(--color-line); display:flex; justify-content:space-between; gap: 12px; flex-wrap:wrap;">
                    <strong>${CW.escape(s.name)}</strong>
                    <span style="color: var(--color-text-muted);">${CW.escape(s.hours)}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            ${pkg.rituals && pkg.rituals.length ? `
              <div class="panel">
                <h3><span class="num">4</span> ตัดพิธีออก = ลดราคา</h3>
                <p style="color:var(--color-text-muted);font-size:0.95rem;">
                  ติ๊กเลือกในกล่องคำนวณราคาด้านขวาเพื่อตัดพิธีและลดราคาทันที
                </p>
                <table class="t">
                  <thead><tr><th>พิธี</th><th class="num">ลดราคาเมื่อตัดออก</th></tr></thead>
                  <tbody>
                    ${pkg.rituals.map(r => `
                      <tr>
                        <td>${CW.escape(r.name)}</td>
                        <td class="num">- ${CW.fmtBaht(r.deductIfRemoved)}</td>
                      </tr>`).join('')}
                  </tbody>
                </table>
              </div>
            ` : ''}

            ${pkgAddons.length ? `
              <div class="panel">
                <h3><span class="num">${pkg.rituals?.length ? '5' : '4'}</span> บริการเสริม (เพิ่มได้ตามต้องการ)</h3>
                <p style="color:var(--color-text-muted);font-size:0.95rem;">บริการเสริมสำหรับแพ็คเกจนี้ — เลือกได้หลายรายการ</p>
                <div style="display:grid; grid-template-columns: 1fr; gap: 10px;">
                  ${pkgAddons.map(a => `
                    <div style="background: var(--color-cream); padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--color-line); display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;">
                      <div>
                        <strong>${CW.escape(a.name)}</strong>
                        <div style="font-size:0.85rem; color: var(--color-text-muted);">${CW.escape(a.description || '')}</div>
                      </div>
                      <div style="text-align:right; min-width: 120px;">
                        <div style="color: var(--color-gold-dark); font-weight: 500;">+ ${CW.fmtBaht(a.price)}</div>
                        <div style="font-size:0.75rem; color: var(--color-text-muted);">ต่อ ${CW.escape(a.unit || 'รายการ')}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            ${pkg.availableMenus && pkg.availableMenus.length ? `
              <div class="panel">
                <h3><span class="num">${(pkg.rituals?.length ? 1 : 0) + (pkgAddons.length ? 1 : 0) + 4}</span> เมนูอาหารที่เลือกได้</h3>
                <div style="display:flex;flex-wrap:wrap;gap:12px;">
                  ${pkg.availableMenus.map(m => {
                    const menu = data.menus?.[m];
                    if (!menu) return '';
                    return `
                      <a href="../menu/?type=${encodeURIComponent(m)}" class="card" style="flex:1 1 200px;text-decoration:none;color:inherit;">
                        <div class="card__img" style="aspect-ratio:4/3;"><img src="${CW.escape(menu.image)}" alt="${CW.escape(menu.name)}" loading="lazy"></div>
                        <div class="card__body" style="padding:16px;">
                          <h4 style="margin:0 0 4px;">${menu.icon || ''} ${CW.escape(menu.name)}</h4>
                          <p style="font-size:0.85rem;color:var(--color-text-muted);margin:0;">${CW.escape(menu.shortDescription || '')}</p>
                        </div>
                      </a>`;
                  }).join('')}
                </div>
              </div>
            ` : ''}
          </div>

          <!-- Price calculator -->
          <div>
            <div class="price-box" id="priceBox">
              <h4>คำนวณราคา</h4>

              <div class="field" style="margin-bottom:12px;">
                <label style="color:#FFFCF7;opacity:0.85;">ช่วงเวลา</label>
                <select id="slotSelect" style="background: rgba(255,255,255,0.95); color: var(--color-text);">
                  ${slots.map(s => `<option value="${CW.escape(s.id)}">${CW.escape(s.name)} (${CW.escape(s.hours)})</option>`).join('')}
                </select>
              </div>

              ${cat === 'wedding' ? `
                <div class="field" style="margin-bottom:12px;">
                  <label style="color:#FFFCF7;opacity:0.85;">ฤดูกาล</label>
                  <div class="toggle" id="seasonTog" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);">
                    <button data-season="high" style="color:#fff;">High</button>
                    <button data-season="low" style="color:#fff;">Low</button>
                  </div>
                </div>
              ` : `<div style="font-size:0.85rem; color: var(--color-gold-light); margin-bottom: 12px;">ราคาสัมมนา · ไม่แยก Season</div>`}

              <div class="field" style="margin-bottom:12px;">
                <label style="color:#FFFCF7;opacity:0.85;">จำนวนแขก</label>
                <select id="guestSelect" style="background: rgba(255,255,255,0.95);color:var(--color-text)">
                  ${(data.guestCountTiers || []).map(n =>
                    `<option value="${n}" ${n === 100 ? 'selected' : ''}>${n} ท่าน</option>`).join('')}
                </select>
              </div>

              <hr>
              <div class="price-meta">ราคาแพ็คเกจ</div>
              <div class="price-num" id="basePriceShow">-</div>

              ${pkg.rituals?.length ? `
                <hr>
                <div class="price-meta" style="margin-bottom:8px;">ตัดพิธี (เลือกเพื่อลดราคา)</div>
                ${pkg.rituals.map(r => `
                  <label>
                    <input type="checkbox" data-ritual="${CW.escape(r.id)}" data-deduct="${r.deductIfRemoved}">
                    <span>${CW.escape(r.name)}</span>
                    <span class="ritual-deduct">- ${CW.fmtPrice(r.deductIfRemoved)}฿</span>
                  </label>
                `).join('')}
              ` : ''}

              <hr>
              <div class="price-meta">รวมสุทธิ</div>
              <div class="price-num" id="totalPrice" style="color: var(--color-gold-light);">-</div>

              ${data.site?.contact?.line ? `<a class="btn btn--primary btn--block mt-md" href="${CW.escape(data.site.contact.line.startsWith('http') ? data.site.contact.line : 'https://line.me/R/ti/p/' + encodeURIComponent(data.site.contact.line))}" target="_blank">💬 สอบถาม / จองผ่าน LINE</a>` : ''}
              ${data.site?.contact?.phone ? `<a class="btn ${data.site?.contact?.line ? 'btn--ghost' : 'btn--primary'} btn--block mt-md" href="tel:${CW.escape(data.site.contact.phone.replace(/[^\\d+]/g, ''))}" style="${data.site?.contact?.line ? 'border-color:rgba(255,255,255,0.4);color:#fff;' : ''}">☎ ${CW.escape(data.site.contact.phone)}</a>` : ''}
              ${data.site?.contact?.facebook ? `<a class="btn btn--ghost btn--block mt-md" href="${CW.escape(data.site.contact.facebook)}" target="_blank" style="border-color:rgba(255,255,255,0.4);color:#fff;">f Facebook</a>` : ''}
            </div>
          </div>
        </div>
      </div>
    </section>
  `;

  // Wire up calculator
  if (cat === 'wedding') {
    document.querySelectorAll('#seasonTog button').forEach(b => {
      b.classList.toggle('active', b.dataset.season === season);
      b.addEventListener('click', () => {
        season = b.dataset.season;
        document.querySelectorAll('#seasonTog button').forEach(x => x.classList.toggle('active', x === b));
        recalc();
      });
    });
  }
  document.getElementById('slotSelect').addEventListener('change', e => {
    timeSlot = e.target.value;
    recalc();
  });
  document.getElementById('guestSelect').addEventListener('change', e => {
    guestCount = e.target.value;
    recalc();
  });
  document.querySelectorAll('#priceBox [data-ritual]').forEach(cb => {
    cb.addEventListener('change', recalc);
  });

  function recalc() {
    const base = CW.computePrice(pkg, timeSlot, season, Number(guestCount));
    let total = base;
    document.querySelectorAll('#priceBox [data-ritual]:checked').forEach(cb => {
      total -= Number(cb.dataset.deduct || 0);
    });
    document.getElementById('basePriceShow').textContent = CW.fmtBaht(base);
    document.getElementById('totalPrice').textContent = CW.fmtBaht(Math.max(0, total));
  }
  recalc();
})();
</script>

</body>
</html>
