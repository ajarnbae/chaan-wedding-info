<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายละเอียดแพ็คเกจ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css?v=20260611b">
<style>
  .section-card { background: var(--color-ivory); border: 1px solid var(--color-line); border-radius: var(--radius-md); padding: 16px 20px; margin-bottom: 12px; }
  .section-card h4 { margin: 0 0 10px; color: var(--color-brown-dark); display: flex; align-items: center; gap: 8px; font-size: 1.05rem; }
  .section-card ul { list-style: none; padding: 0; margin: 0; }
  .section-card li { padding: 5px 0 5px 22px; position: relative; font-size: 0.95rem; color: var(--color-text); }
  .section-card li::before { content: "•"; position: absolute; left: 6px; color: var(--color-gold); font-size: 1.2rem; line-height: 1; top: 8px; }
  .freebonus { background: linear-gradient(135deg, #FBF6EF 0%, var(--color-gold-light) 100%); border: 1px solid var(--color-gold); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 12px; }
  .freebonus h4 { color: var(--color-brown-dark); margin: 0 0 10px; }
  .freebonus li::before { content: "🎁"; left: 0; top: 6px; font-size: 0.95rem; }
  .freebonus li { padding-left: 26px; }
  .overflow-note { background: var(--color-cream-warm); border-left: 4px solid var(--color-gold); padding: 10px 14px; border-radius: 4px; font-size: 0.9rem; margin-top: 8px; color: var(--color-brown-dark); }
  .customer-provides { background: var(--color-brown-dark); color: var(--color-cream); padding: 18px 20px; border-radius: var(--radius-md); margin-bottom: 12px; }
  .customer-provides h4 { color: var(--color-gold-light); margin: 0 0 10px; }
  .customer-provides li { color: var(--color-cream); }
  .customer-provides li::before { color: var(--color-gold-light); content: "✓"; }

  /* Add-on checkbox cards */
  .addon-card {
    background: var(--color-cream);
    padding: 14px 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-line);
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .addon-card:hover { border-color: var(--color-gold-light); }
  .addon-card input[type="checkbox"] {
    width: 20px; height: 20px;
    accent-color: var(--color-gold);
    cursor: pointer;
    flex-shrink: 0;
  }
  .addon-card__body { flex: 1; }
  .addon-card__name { font-weight: 500; color: var(--color-brown-dark); }
  .addon-card__desc { font-size: 0.85rem; color: var(--color-text-muted); margin-top: 2px; }
  .addon-card__price { text-align: right; min-width: 110px; }
  .addon-card__price .num { color: var(--color-gold-dark); font-weight: 500; }
  .addon-card__price .unit { font-size: 0.75rem; color: var(--color-text-muted); }
  .addon-card.is-checked { background: linear-gradient(135deg, var(--color-cream-warm) 0%, var(--color-ivory) 100%); border-color: var(--color-gold); }

  /* Menu set expandable */
  .menu-group { margin-bottom: 16px; }
  .menu-group__title {
    font-family: var(--font-serif);
    font-size: 1.1rem;
    color: var(--color-brown-dark);
    margin: 0 0 6px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--color-gold-light);
  }
  .menu-set { background: var(--color-ivory); border: 1px solid var(--color-line); border-radius: var(--radius-md); margin-bottom: 8px; overflow: hidden; }
  .menu-set summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .menu-set summary::-webkit-details-marker { display: none; }
  .menu-set summary::after {
    content: "▼";
    color: var(--color-gold);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }
  .menu-set[open] summary::after { transform: rotate(180deg); }
  .menu-set summary:hover { background: var(--color-cream); }
  .menu-set__title { font-weight: 500; color: var(--color-brown-dark); flex: 1; min-width: 200px; }
  .menu-set__price { color: var(--color-gold-dark); font-weight: 500; }
  .menu-set__body { padding: 14px 18px 18px; border-top: 1px solid var(--color-line); background: var(--color-cream); }
  .selection-block {
    background: var(--color-ivory);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .selection-block h5 {
    margin: 0 0 8px;
    color: var(--color-brown-dark);
    font-family: var(--font-serif);
    font-size: 0.98rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .selection-block h5 small {
    background: var(--color-gold);
    color: #fff;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    font-family: var(--font-sans);
  }
  .selection-block .opts { display: flex; flex-wrap: wrap; gap: 6px; }
  .selection-block .opt { background: var(--color-cream-warm); border: 1px solid var(--color-line); border-radius: 999px; padding: 4px 12px; font-size: 0.83rem; color: var(--color-text); }

  /* Decor change radio */
  .decor-row {
    background: var(--color-cream);
    padding: 12px 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--color-line);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .decor-row:hover { border-color: var(--color-gold-light); }
  .decor-row input[type="radio"] {
    width: 18px; height: 18px;
    accent-color: var(--color-gold);
    cursor: pointer;
    flex-shrink: 0;
  }
  .decor-row__name { flex: 1; }
  .decor-row__price { color: var(--color-gold-dark); font-weight: 500; }
  .decor-row.is-selected { background: linear-gradient(135deg, var(--color-cream-warm) 0%, var(--color-ivory) 100%); border-color: var(--color-gold); }

  /* Calculator line items */
  .calc-line {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.92);
  }
  .calc-line .label { flex: 1; }
  .calc-line .amount { color: var(--color-gold-light); font-weight: 500; }
  .calc-line.deduct .amount { color: #FFB39E; }
</style>
</head>
<body>

<div id="nav-mount"></div>

<div id="detailMount" class="loading" style="min-height: 60vh;">กำลังโหลดรายละเอียด...</div>

<div id="footer-mount"></div>

<script src="../js/common.js?v=20260611b"></script>
<script>
(async function() {
  const data = await CW.mountChrome('packages');
  if (!data) return;

  const id = CW.qs('id');
  const all = [...(data.packages?.wedding || []), ...(data.packages?.seminar || [])];
  const pkg = all.find(p => p.id === id);
  const mount = document.getElementById('detailMount');

  if (!pkg) {
    mount.classList.remove('loading');
    mount.innerHTML = `<div class="container section"><div class="empty-state">ไม่พบแพ็คเกจ<div style="margin-top:16px"><a href="./" class="btn btn--ghost">← กลับ</a></div></div></div>`;
    return;
  }

  const cat = CW.findPackageCategory(data, pkg.id);
  const isWedding = cat === 'wedding';
  const allSlots = data.timeSlots?.[cat] || [];
  const slots = allSlots.filter(s => (pkg.availableTimeSlots || []).includes(s.id));
  const guestBase = pkg.guestBase || 100;
  const isMorning = pkg.id === 'signature_morning_only';

  let season = (cat === 'seminar' || pkg.season === 'low') ? (pkg.season === 'low' ? 'low' : 'high') : (CW.qs('season') || CW.currentSeason(data.seasonInfo));
  let timeSlot = slots[0]?.id;
  let guestCount = String(guestBase);
  let crossYear = false;
  let selectedDecorId = null;

  // Build addon lookup
  const addonMap = {};
  (data.venueFees?.addons || []).forEach(a => { addonMap[a.id] = a; });
  const pkgAddons = (pkg.availableAddons || []).map(id => addonMap[id]).filter(Boolean);

  // Decor changes available for this package
  const decorCat = pkg.decorChangeCategory;
  const decorOptions = decorCat && data.venueFees?.decorChanges?.[decorCat] ? data.venueFees.decorChanges[decorCat] : [];
  const decorNote = decorCat === 'promo' ? data.venueFees?.decorChanges?.promoNote : (decorCat === 'full' ? data.venueFees?.decorChanges?.fullNote : '');
  if (decorOptions.length) selectedDecorId = decorOptions[0].id; // default = first (typically "ไม่เปลี่ยน")

  // Build available menu groups
  const menuGroups = [];
  (pkg.availableMenus || []).forEach(mKey => {
    const menu = data.menus?.[mKey];
    if (!menu) return;
    const sets = (menu.sets || []).filter(s => !pkg.allowedMenuSetIds?.length || pkg.allowedMenuSetIds.includes(s.id));
    if (sets.length) menuGroups.push({ key: mKey, menu, sets });
  });
  const totalSetCount = menuGroups.reduce((sum, g) => sum + g.sets.length, 0);

  function priceLabel(set) {
    if (set.pricePerPerson != null && set.pricePerPerson > 0) return CW.fmtBaht(set.pricePerPerson) + ' / ท่าน';
    if (set.pricePerTable != null && set.pricePerTable > 0) return '+ ' + CW.fmtBaht(set.pricePerTable) + ' / โต๊ะ';
    return 'รวมในแพ็คเกจ';
  }
  function renderSelectionBlock(sel) {
    const small = sel.pickCount === 'all' ? 'เสิร์ฟทั้งหมด' : (typeof sel.pickCount === 'number' ? `เลือก ${sel.pickCount}` : sel.pickCount);
    return `
      <div class="selection-block">
        <h5>${CW.escape(sel.category)} <small>${CW.escape(String(small))}</small></h5>
        <div class="opts">${(sel.options || []).map(o => `<span class="opt">${CW.escape(o)}</span>`).join('')}</div>
      </div>`;
  }
  function renderSetBody(set) {
    if (set.selections && set.selections.length) {
      return set.selections.map(renderSelectionBlock).join('');
    }
    if (set.items && set.items.length) {
      return `<ul class="section-card" style="margin:0;border:none;padding:0;">${set.items.map(i => `<li>${CW.escape(i)}</li>`).join('')}</ul>`;
    }
    return '';
  }

  mount.classList.remove('loading');
  // section numbering
  let n = 0;
  const num = () => `<span class="num">${++n}</span>`;

  mount.innerHTML = `
    <div class="detail-hero">
      <img src="${CW.escape(pkg.image)}" alt="${CW.escape(pkg.name)}" style="${CW.imgStyle(pkg)}">
      <div class="detail-hero__overlay">
        <div>
          <div class="eyebrow">${isWedding ? 'Wedding Package' : 'Seminar Package'}${pkg.tier === 'signature' ? ' · Signature จันทร์ครบเครื่อง' : pkg.tier === 'essential' ? ' · Essential จันทร์คุ้มครบ' : ''}</div>
          <h1>${CW.escape(pkg.name)}</h1>
          <p style="margin-top:8px;opacity:0.95;">${CW.escape(pkg.subtitle || '')}</p>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span><a href="./">แพ็คเกจ</a> <span>/</span> ${CW.escape(pkg.name)}</div>

        <div class="detail-grid">
          <!-- LEFT: content -->
          <div>
            <!-- About -->
            <div class="panel">
              <h3>${num()} เกี่ยวกับแพ็คเกจ</h3>
              <p>${CW.escape(pkg.longDescription || pkg.shortDescription || '')}</p>
              ${pkg.notes ? `<div class="alert">${CW.escape(pkg.notes)}</div>` : ''}
              ${pkg.crossYearDiscount ? `<div class="alert" style="background:#FFF8E7;border-left-color:var(--color-success);">💰 <strong>จองข้ามปี ลด ${CW.fmtBaht(pkg.crossYearDiscount)}</strong> · ติ๊กในกล่องคำนวณราคาด้านขวา</div>` : ''}
            </div>

            <!-- Time slots -->
            ${slots.length ? `
            <div class="panel">
              <h3>${num()} ช่วงเวลาที่จัดได้</h3>
              <div style="display:grid;grid-template-columns:1fr;gap:8px;">
                ${slots.map(s => `
                  <div style="background: var(--color-cream); padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid var(--color-line); display:flex; justify-content:space-between; gap: 12px; flex-wrap:wrap;">
                    <strong>${CW.escape(s.name)}</strong>
                    <span style="color: var(--color-text-muted);">${CW.escape(s.hours)}</span>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

            <!-- Inclusion sections -->
            ${(pkg.includedSections || []).length ? `
            <div class="panel">
              <h3>${num()} สิ่งที่ได้รับในแพ็คเกจ</h3>
              <div>
                ${pkg.includedSections.map(sec => `
                  <div class="section-card">
                    <h4>${CW.escape(sec.title)}</h4>
                    <ul>${(sec.items || []).map(i => `<li>${CW.escape(i)}</li>`).join('')}</ul>
                    ${sec.note ? `<p style="font-size:0.85rem;color:var(--color-text-muted);font-style:italic;margin:6px 0 0;border-top:1px dashed var(--color-line);padding-top:6px;">${CW.escape(sec.note)}</p>` : ''}
                  </div>
                `).join('')}
              </div>
              ${pkg.overflowPricing?.label ? `<div class="overflow-note">⚠ ${CW.escape(pkg.overflowPricing.label)}</div>` : ''}
              ${pkg.snackOverflow?.label ? `<div class="overflow-note">⚠ ${CW.escape(pkg.snackOverflow.label)}</div>` : ''}
            </div>` : ''}

            <!-- Free bonuses -->
            ${pkg.freeBonuses && pkg.freeBonuses.length ? `
            <div class="panel">
              <h3>${num()} 🎁 ของแถมฟรี</h3>
              <div class="freebonus">
                <h4>${CW.escape(pkg.freeBonusLabel || 'พิเศษ! แถมฟรี')}</h4>
                <ul>${pkg.freeBonuses.map(b => `<li>${CW.escape(b)}</li>`).join('')}</ul>
              </div>
            </div>` : ''}

            <!-- Menu (inline with click-to-expand) -->
            ${menuGroups.length ? `
            <div class="panel">
              <h3>${num()} 🍽️ เมนูอาหาร</h3>
              ${totalSetCount > 1 ? `<p style="color:var(--color-text-muted);font-size:0.9rem;margin-bottom:14px;">เลือกประเภทอาหารได้ 1 ประเภท · คลิกเซตเพื่อดูรายการอาหาร</p>` : ''}
              ${pkg.allowedMenuSetIds?.length ? `<p style="color:var(--color-gold-dark);font-size:0.9rem;">⚡ แพ็คเกจนี้รองรับเฉพาะเซตที่กำหนด</p>` : ''}
              ${menuGroups.map(g => `
                <div class="menu-group">
                  <h4 class="menu-group__title">${g.menu.icon || ''} ${CW.escape(g.menu.name)}</h4>
                  ${g.sets.map(s => `
                    <details class="menu-set">
                      <summary>
                        <div class="menu-set__title">${CW.escape(s.name)}</div>
                        <div class="menu-set__price">${priceLabel(s)}</div>
                      </summary>
                      <div class="menu-set__body">
                        ${s.description ? `<p style="color:var(--color-text-muted);font-size:0.9rem;margin:0 0 12px;">${CW.escape(s.description)}</p>` : ''}
                        ${renderSetBody(s)}
                      </div>
                    </details>
                  `).join('')}
                </div>
              `).join('')}
            </div>` : ''}

            <!-- Customer provides -->
            ${pkg.customerProvides && pkg.customerProvides.length ? `
            <div class="panel">
              <h3>${num()} 📋 สิ่งที่เจ้าภาพต้องเตรียมเอง</h3>
              <div class="customer-provides">
                <h4>เตรียมล่วงหน้า</h4>
                <ul>${pkg.customerProvides.map(c => `<li>${CW.escape(c)}</li>`).join('')}</ul>
              </div>
            </div>` : ''}

            <!-- Rituals: cuttable rituals list with inline checkboxes (after customer-provides, before add-ons) -->
            ${pkg.rituals && pkg.rituals.length ? `
            <div class="panel">
              <h3>${num()} 🪔 งานพิธีที่ต้องการตัดออก</h3>
              <p style="color:var(--color-text-muted);font-size:0.95rem;margin-bottom:6px;">ติ๊กเลือกพิธีที่ต้องการตัดออก — ราคาจะถูกลดในกล่องคำนวณทันที</p>
              <p style="color:var(--color-text-muted);font-size:0.85rem;font-style:italic;margin-bottom:14px;">${CW.escape(data.ritualNote || 'บางรายการพิธีที่ถูกตัดออกจะไม่ได้ลดราคา เนื่องจากเป็นส่วนที่ทางสถานที่ไม่มีค่าใช้จ่ายเพิ่ม')}</p>
              ${pkg.ritualNote ? `<p style="color:var(--color-brown-dark);font-size:0.88rem;font-weight:500;margin-bottom:14px;background:var(--color-cream-warm);padding:8px 12px;border-radius:var(--radius-sm);border-left:3px solid var(--color-gold);">${CW.escape(pkg.ritualNote)}</p>` : '<div style="margin-bottom:14px;"></div>'}
              <div style="display:grid;grid-template-columns:1fr;gap:6px;">
                ${pkg.rituals.map(r => `
                  <label class="ritual-row" data-ritual-id="${CW.escape(r.id)}" style="background:var(--color-cream);padding:12px 14px;border-radius:var(--radius-md);border:1px solid var(--color-line);display:flex;justify-content:space-between;gap:12px;align-items:center;cursor:${r.deductIfRemoved > 0 ? 'pointer' : 'default'};transition:all 0.15s ease;">
                    <span style="display:flex;align-items:center;gap:10px;flex:1;">
                      <input type="checkbox" data-ritual-section="${CW.escape(r.id)}" data-deduct="${r.deductIfRemoved}" style="width:18px;height:18px;accent-color:var(--color-gold);flex-shrink:0;">
                      <span>${CW.escape(r.name)}</span>
                    </span>
                    <span style="color:${r.deductIfRemoved > 0 ? 'var(--color-success)' : 'var(--color-text-muted)'};font-weight:500;white-space:nowrap;">
                      ${r.deductIfRemoved > 0 ? '− ' + CW.fmtBaht(r.deductIfRemoved) : 'ไม่ลด'}
                    </span>
                  </label>
                `).join('')}
              </div>
            </div>` : ''}

            <!-- Add-ons with checkboxes -->
            ${pkgAddons.length ? `
            <div class="panel">
              <h3>${num()} ✨ บริการเสริม (เลือกเพิ่มได้)</h3>
              <p style="color:var(--color-text-muted);font-size:0.95rem;">ติ๊กเลือก add-on ที่ต้องการ — ราคาจะรวมในกล่องคำนวณ</p>
              <div>
                ${pkgAddons.map(a => `
                  <label class="addon-card" data-addon-id="${CW.escape(a.id)}">
                    <input type="checkbox" data-addon="${CW.escape(a.id)}" data-price="${a.price}">
                    <div class="addon-card__body">
                      <div class="addon-card__name">${CW.escape(a.name)}</div>
                      <div class="addon-card__desc">${CW.escape(a.description || '')}</div>
                    </div>
                    <div class="addon-card__price">
                      <div class="num">+ ${CW.fmtBaht(a.price)}</div>
                      <div class="unit">ต่อ ${CW.escape(a.unit || 'รายการ')}</div>
                    </div>
                  </label>
                `).join('')}
              </div>
            </div>` : ''}

            <!-- Decor change options (radio) -->
            ${decorOptions.length ? `
            <div class="panel">
              <h3>${num()} 🌸 ค่าเปลี่ยนการตกแต่ง</h3>
              <p style="color:var(--color-text-muted);font-size:0.9rem;">${CW.escape(decorNote || '')} · เลือกได้ 1 รายการ</p>
              <div>
                ${decorOptions.map((d, i) => `
                  <label class="decor-row${i === 0 ? ' is-selected' : ''}" data-decor-id="${CW.escape(d.id)}">
                    <input type="radio" name="decorChange" value="${CW.escape(d.id)}" data-price="${d.price}" ${i === 0 ? 'checked' : ''}>
                    <div class="decor-row__name">${CW.escape(d.name)}</div>
                    <div class="decor-row__price">${d.displayPrice || (d.price > 0 ? '+ ' + CW.fmtBaht(d.price) : 'ไม่เพิ่ม')}</div>
                  </label>
                `).join('')}
              </div>
            </div>` : ''}

            <!-- Gallery banner (inside LEFT column, sticky like price-box) -->
            <a href="../gallery/index.html"
               style="display:flex; align-items:center; gap:12px;
                      background: linear-gradient(135deg, var(--color-gold-dark) 0%, var(--color-gold) 50%, var(--color-gold-light) 100%);
                      color: var(--color-cream);
                      border-radius: 12px;
                      padding: 16px 20px;
                      text-decoration: none;
                      box-shadow: 0 4px 16px rgba(184,146,75,0.35);
                      transition: transform 0.2s, box-shadow 0.2s;"
               onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(184,146,75,0.5)'"
               onmouseout="this.style.transform='';this.style.boxShadow='0 4px 16px rgba(184,146,75,0.35)'">
              <span style="font-size:2rem; line-height:1; flex-shrink:0;">🖼️</span>
              <div style="font-weight:700; font-size:1rem; letter-spacing:0.03em;">คลิกเพื่อดูรูปภาพสถานที่</div>
              <span style="margin-left:auto; font-size:1.2rem; opacity:0.8;">›</span>
            </a>
          </div>

          <!-- RIGHT: price calculator -->
          <div>
            <div class="price-box" id="priceBox">
              <h4>คำนวณราคา</h4>

              ${slots.length > 1 ? `
              <div class="field" style="margin-bottom:12px;">
                <label style="color:#FFFCF7;opacity:0.85;">ช่วงเวลา</label>
                <select id="slotSelect" style="background: rgba(255,255,255,0.95); color: var(--color-text);">
                  ${slots.map(s => `<option value="${CW.escape(s.id)}">${CW.escape(s.name)} (${CW.escape(s.hours)})</option>`).join('')}
                </select>
              </div>` : (slots.length === 1 ? `
              <div style="font-size:0.85rem; color: var(--color-gold-light); margin-bottom: 12px;">⏰ ${CW.escape(slots[0].name)} · ${CW.escape(slots[0].hours)}</div>` : '')}

              <div class="field" style="margin-bottom:12px;">
                <label style="color:#FFFCF7;opacity:0.85;">จำนวนแขก</label>
                <select id="guestSelect" style="background: rgba(255,255,255,0.95);color:var(--color-text)">
                  ${(data.guestCountTiers || []).filter(n => isMorning ? n >= 50 : n >= 50).map(n =>
                    `<option value="${n}" ${n === guestBase ? 'selected' : ''}>${n} ท่าน${n === guestBase ? ' (ราคาฐาน)' : ''}</option>`).join('')}
                </select>
              </div>

              ${(pkg.overflowPricing?.buffet || pkg.overflowPricing?.chinese || pkg.overflowPricing?.thai) ? `
              <div class="field" id="overflowMenuField" style="margin-bottom:12px; display:none;">
                <label style="color:#FFFCF7;opacity:0.85;">ประเภทเมนู (สำหรับคำนวณแขกต่ำ/เกิน base)</label>
                <select id="overflowMenuSelect" style="background: rgba(255,255,255,0.95); color: var(--color-text);">
                  ${pkg.overflowPricing?.buffet ? `<option value="buffet">บุฟเฟต์</option>` : ''}
                  ${pkg.overflowPricing?.chinese ? `<option value="chinese">โต๊ะจีน (${pkg.overflowPricing.chinese.tableSize} ท่าน/โต๊ะ)</option>` : ''}
                  ${pkg.overflowPricing?.thai ? `<option value="thai">โต๊ะจันทร์ (${pkg.overflowPricing.thai.tableSize} ท่าน/โต๊ะ)</option>` : ''}
                </select>
              </div>` : ''}

              ${pkg.crossYearDiscount ? `
              <div style="background:rgba(216,180,115,0.15);padding:10px 12px;border-radius:8px;margin-bottom:12px;border:1px solid var(--color-gold-light);">
                <label style="display:flex;gap:8px;cursor:pointer;align-items:center;">
                  <input type="checkbox" id="crossYearChk" style="accent-color:var(--color-gold-light);">
                  <span>จองข้ามปี <span style="color:var(--color-gold-light);">- ${CW.fmtBaht(pkg.crossYearDiscount)}</span></span>
                </label>
              </div>` : ''}

              <hr>
              <div id="calcLines"></div>

              ${pkg.rituals?.length ? `
                <hr>
                <div class="price-meta" style="margin-bottom:8px;">ตัดพิธี</div>
                ${pkg.rituals.map(r => `
                  <label style="display:flex;align-items:center;gap:10px;padding:4px 0;">
                    <input type="checkbox" data-ritual="${CW.escape(r.id)}" data-deduct="${r.deductIfRemoved}">
                    <span style="flex:1;font-size:0.88rem;">${CW.escape(r.name)}</span>
                    <span style="color:#FFB39E;font-size:0.85rem;">- ${CW.fmtPrice(r.deductIfRemoved)}฿</span>
                  </label>
                `).join('')}
              ` : ''}

              <hr>
              <div class="price-meta">รวมสุทธิ</div>
              <div class="price-num" id="totalPrice" style="color: var(--color-gold-light);">-</div>

              ${data.site?.contact?.line ? `<a class="btn btn--primary btn--block mt-md" href="${CW.escape(data.site.contact.line.startsWith('http') ? data.site.contact.line : 'https://line.me/R/ti/p/' + encodeURIComponent(data.site.contact.line))}" target="_blank">💬 จอง/สอบถาม LINE</a>` : ''}
              ${data.site?.contact?.phone ? `<a class="btn ${data.site?.contact?.line ? 'btn--ghost' : 'btn--primary'} btn--block mt-md" href="tel:${CW.escape(data.site.contact.phone.replace(/[^\\d+]/g, ''))}" style="${data.site?.contact?.line ? 'border-color:rgba(255,255,255,0.4);color:#fff;' : ''}">☎ ${CW.escape(data.site.contact.phone)}</a>` : ''}
              ${data.site?.contact?.facebook ? `<a class="btn btn--ghost btn--block mt-md" href="${CW.escape(data.site.contact.facebook)}" target="_blank" style="border-color:rgba(255,255,255,0.4);color:#fff;">f Facebook</a>` : ''}
            </div>
          </div>
        </div>
      </div>
    </section>
  `;

  // Wire up
  const slotSel = document.getElementById('slotSelect');
  if (slotSel) slotSel.addEventListener('change', e => { timeSlot = e.target.value; recalc(); });
  document.getElementById('guestSelect').addEventListener('change', e => { guestCount = e.target.value; recalc(); });
  const overflowMenuSel = document.getElementById('overflowMenuSelect');
  if (overflowMenuSel) overflowMenuSel.addEventListener('change', recalc);
  const cyChk = document.getElementById('crossYearChk');
  if (cyChk) cyChk.addEventListener('change', e => { crossYear = e.target.checked; recalc(); });
  document.querySelectorAll('#priceBox [data-ritual]').forEach(cb => cb.addEventListener('change', recalc));

  // Addon checkboxes
  document.querySelectorAll('.addon-card input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', e => {
      e.target.closest('.addon-card').classList.toggle('is-checked', e.target.checked);
      recalc();
    });
  });

  // Section-side ritual checkboxes — sync with calculator-side
  document.querySelectorAll('[data-ritual-section]').forEach(cb => {
    cb.addEventListener('change', e => {
      const rid = e.target.dataset.ritualSection;
      const partner = document.querySelector(`#priceBox [data-ritual="${rid}"]`);
      if (partner) {
        partner.checked = e.target.checked;
      }
      e.target.closest('.ritual-row')?.style.setProperty('background', e.target.checked ? 'rgba(216,180,115,0.18)' : 'var(--color-cream)');
      recalc();
    });
  });
  // Reverse-sync: when calculator-side ritual is toggled, also update section-side
  document.querySelectorAll('#priceBox [data-ritual]').forEach(cb => {
    cb.addEventListener('change', e => {
      const partner = document.querySelector(`[data-ritual-section="${e.target.dataset.ritual}"]`);
      if (partner) {
        partner.checked = e.target.checked;
        partner.closest('.ritual-row')?.style.setProperty('background', e.target.checked ? 'rgba(216,180,115,0.18)' : 'var(--color-cream)');
      }
    });
  });

  // Decor radios
  document.querySelectorAll('.decor-row input[type="radio"]').forEach(r => {
    r.addEventListener('change', e => {
      document.querySelectorAll('.decor-row').forEach(x => x.classList.remove('is-selected'));
      e.target.closest('.decor-row').classList.add('is-selected');
      selectedDecorId = e.target.value;
      recalc();
    });
  });

  function recalc() {
    const lines = [];
    const base = pkg.basePricing?.[timeSlot]?.[season] ?? 0;
    let total = base;
    lines.push({ label: `ราคาฐาน (${guestBase} ท่าน)`, amount: base, type: 'base' });

    // Guest overflow/underflow
    const guests = Number(guestCount);
    const delta = guests - guestBase;
    const overflowField = document.getElementById('overflowMenuField');
    if (delta !== 0 && pkg.overflowPricing) {
      const op = pkg.overflowPricing;
      const has3 = op.buffet || op.chinese || op.thai;
      let amt = 0, desc = '';
      if (has3) {
        if (overflowField) overflowField.style.display = '';
        const choice = overflowMenuSel?.value || (op.buffet ? 'buffet' : (op.chinese ? 'chinese' : 'thai'));
        const rule = op[choice];
        if (rule?.perPerson) {
          amt = delta * rule.perPerson;
          desc = `${delta > 0 ? 'ส่วนเกิน' : 'ลดแขก'} ${Math.abs(delta)} ท่าน (${choice === 'buffet' ? 'บุฟเฟต์' : choice === 'chinese' ? 'โต๊ะจีน' : 'โต๊ะจันทร์'}) × ${rule.perPerson}`;
        } else if (rule?.perTable) {
          const tables = Math.ceil(Math.abs(delta) / (rule.tableSize || 9)) * Math.sign(delta);
          amt = tables * rule.perTable;
          desc = `${delta > 0 ? 'ส่วนเกิน' : 'ลดแขก'} ${Math.abs(delta)} ท่าน → ${Math.abs(tables)} โต๊ะ × ${rule.perTable}`;
        }
      } else if (op.perPerson) {
        amt = delta * op.perPerson;
        desc = `${delta > 0 ? 'ส่วนเกิน' : 'ลดแขก'} ${Math.abs(delta)} ท่าน × ${op.perPerson}`;
      } else if (op.thai?.perTable) {
        const tables = Math.ceil(Math.abs(delta) / (op.thai.tableSize || 9)) * Math.sign(delta);
        amt = tables * op.thai.perTable;
        desc = `${delta > 0 ? 'ส่วนเกิน' : 'ลดแขก'} ${Math.abs(delta)} ท่าน → ${Math.abs(tables)} โต๊ะ × ${op.thai.perTable}`;
      }
      if (amt !== 0) {
        lines.push({ label: desc, amount: amt, type: amt > 0 ? 'add' : 'deduct' });
        total += amt;
      }
    } else {
      if (overflowField) overflowField.style.display = 'none';
    }

    // Cross-year
    if (crossYear && pkg.crossYearDiscount) {
      total -= pkg.crossYearDiscount;
      lines.push({ label: 'ส่วนลดจองข้ามปี', amount: -pkg.crossYearDiscount, type: 'deduct' });
    }

    // Add-ons
    document.querySelectorAll('.addon-card input[type="checkbox"]:checked').forEach(cb => {
      const addonId = cb.dataset.addon;
      const addon = addonMap[addonId];
      if (addon) {
        total += addon.price;
        lines.push({ label: `✨ ${addon.name}`, amount: addon.price, type: 'add' });
      }
    });

    // Decor change
    if (selectedDecorId && decorOptions.length) {
      const d = decorOptions.find(x => x.id === selectedDecorId);
      if (d && d.price > 0) {
        total += d.price;
        lines.push({ label: `🌸 ${d.name}`, amount: d.price, type: 'add' });
      }
    }

    // Rituals
    document.querySelectorAll('#priceBox [data-ritual]:checked').forEach(cb => {
      const deduct = Number(cb.dataset.deduct || 0);
      total -= deduct;
      const r = pkg.rituals?.find(x => x.id === cb.dataset.ritual);
      if (r) lines.push({ label: `🪔 ตัด: ${r.name}`, amount: -deduct, type: 'deduct' });
    });

    // Render lines
    document.getElementById('calcLines').innerHTML = lines.map(l => `
      <div class="calc-line ${l.type === 'deduct' ? 'deduct' : ''}">
        <div class="label">${CW.escape(l.label)}</div>
        <div class="amount">${l.amount >= 0 ? (l.type === 'base' ? '' : '+ ') : '- '}${CW.fmtBaht(Math.abs(l.amount))}</div>
      </div>
    `).join('');

    document.getElementById('totalPrice').textContent = CW.fmtBaht(Math.max(0, total));
  }
  recalc();
})();
</script>

</body>
</html>
