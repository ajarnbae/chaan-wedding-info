<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายละเอียดแพ็คเกจ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .section-card {
    background: var(--color-ivory);
    border: 1px solid var(--color-line);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .section-card h4 {
    margin: 0 0 10px;
    color: var(--color-brown-dark);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.05rem;
  }
  .section-card ul { list-style: none; padding: 0; margin: 0; }
  .section-card li {
    padding: 5px 0 5px 22px;
    position: relative;
    font-size: 0.95rem;
    color: var(--color-text);
  }
  .section-card li::before {
    content: "•";
    position: absolute;
    left: 6px;
    color: var(--color-gold);
    font-size: 1.2rem;
    line-height: 1;
    top: 8px;
  }
  .freebonus {
    background: linear-gradient(135deg, #FBF6EF 0%, var(--color-gold-light) 100%);
    border: 1px solid var(--color-gold);
    border-radius: var(--radius-md);
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .freebonus h4 { color: var(--color-brown-dark); margin: 0 0 10px; }
  .freebonus li::before { content: "🎁"; left: 0; top: 6px; font-size: 0.95rem; }
  .freebonus li { padding-left: 26px; }
  .overflow-note {
    background: var(--color-cream-warm);
    border-left: 4px solid var(--color-gold);
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 0.9rem;
    margin-top: 8px;
    color: var(--color-brown-dark);
  }
  .customer-provides {
    background: var(--color-brown-dark);
    color: var(--color-cream);
    padding: 18px 20px;
    border-radius: var(--radius-md);
    margin-bottom: 12px;
  }
  .customer-provides h4 { color: var(--color-gold-light); margin: 0 0 10px; }
  .customer-provides li { color: var(--color-cream); }
  .customer-provides li::before { color: var(--color-gold-light); content: "✓"; }
</style>
</head>
<body>

<div id="nav-mount"></div>

<div id="detailMount" class="loading" style="min-height: 60vh;">กำลังโหลดรายละเอียด...</div>

<div id="footer-mount"></div>

<script src="../js/common.js"></script>
<script>
(async function() {
  const data = await CW.mountChrome('packages');
  if (!data) return;

  const id = CW.qs('id');
  const all = [...(data.packages?.wedding || []), ...(data.packages?.seminar || [])];
  const pkg = all.find(p => p.id === id);
  const mount = document.getElementById('detailMount');

  if (!pkg) {
    mount.classList.remove('loading');
    mount.innerHTML = `
      <div class="container section">
        <div class="empty-state">ไม่พบแพ็คเกจ
          <div style="margin-top:16px"><a href="./" class="btn btn--ghost">← กลับหน้าแพ็คเกจ</a></div>
        </div>
      </div>`;
    return;
  }

  const cat = CW.findPackageCategory(data, pkg.id);
  const isWedding = cat === 'wedding';
  const allSlots = data.timeSlots?.[cat] || [];
  const slots = allSlots.filter(s => (pkg.availableTimeSlots || []).includes(s.id));
  const guestBase = pkg.guestBase || 100;

  let season = (cat === 'seminar' || pkg.season === 'low') ? (pkg.season === 'low' ? 'low' : 'high') : (CW.qs('season') || CW.currentSeason(data.seasonInfo));
  let timeSlot = slots[0]?.id;
  let guestCount = String(guestBase);
  let crossYear = false;

  // Build addon lookup
  const addonMap = {};
  (data.venueFees?.addons || []).forEach(a => { addonMap[a.id] = a; });
  const pkgAddons = (pkg.availableAddons || []).map(id => addonMap[id]).filter(Boolean);

  // Build available menu sets
  const menuOpts = [];
  (pkg.availableMenus || []).forEach(mKey => {
    const menu = data.menus?.[mKey];
    if (!menu) return;
    const sets = (menu.sets || []).filter(s => !pkg.allowedMenuSetIds?.length || pkg.allowedMenuSetIds.includes(s.id));
    if (sets.length) menuOpts.push({ key: mKey, menu, sets });
  });

  function escapeAttr(s) { return CW.escape(s); }
  function priceLabel(set) {
    if (set.pricePerPerson != null && set.pricePerPerson > 0) return CW.fmtBaht(set.pricePerPerson) + ' / ท่าน';
    if (set.pricePerTable != null && set.pricePerTable > 0) return '+ ' + CW.fmtBaht(set.pricePerTable) + ' / โต๊ะ';
    return 'รวมในแพ็คเกจ';
  }

  mount.classList.remove('loading');
  mount.innerHTML = `
    <div class="detail-hero">
      <img src="${CW.escape(pkg.image)}" alt="${CW.escape(pkg.name)}">
      <div class="detail-hero__overlay">
        <div>
          <div class="eyebrow">${isWedding ? 'Wedding Package' : 'Seminar Package'}${pkg.isPromo ? ' · 🔥 PROMO' : ''}</div>
          <h1>${CW.escape(pkg.name)}</h1>
          <p style="margin-top:8px;opacity:0.95;">${CW.escape(pkg.subtitle || '')}</p>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="breadcrumb">
          <a href="../index.html">หน้าแรก</a> <span>/</span>
          <a href="./">แพ็คเกจ</a> <span>/</span>
          ${CW.escape(pkg.name)}
        </div>

        <div class="detail-grid">
          <!-- LEFT: content -->
          <div>
            <div class="panel">
              <h3><span class="num">1</span> เกี่ยวกับแพ็คเกจ</h3>
              <p>${CW.escape(pkg.longDescription || pkg.shortDescription || '')}</p>
              ${pkg.notes ? `<div class="alert">${CW.escape(pkg.notes)}</div>` : ''}
              ${pkg.crossYearDiscount ? `<div class="alert" style="background:#FFF8E7;border-left-color:var(--color-success);">💰 <strong>จองข้ามปี ลด ${CW.fmtBaht(pkg.crossYearDiscount)}</strong> · ติ๊กในกล่องคำนวณราคาด้านขวา</div>` : ''}
            </div>

            ${slots.length ? `
            <div class="panel">
              <h3><span class="num">2</span> ช่วงเวลาที่จัดได้</h3>
              <div style="display:grid;grid-template-columns:1fr;gap:8px;">
                ${slots.map(s => `
                  <div style="background: var(--color-cream); padding: 12px 16px; border-radius: var(--radius-md); border: 1px solid var(--color-line); display:flex; justify-content:space-between; gap: 12px; flex-wrap:wrap;">
                    <strong>${CW.escape(s.name)}</strong>
                    <span style="color: var(--color-text-muted);">${CW.escape(s.hours)}</span>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

            ${(pkg.includedSections || []).length ? `
            <div class="panel">
              <h3><span class="num">3</span> สิ่งที่ได้รับในแพ็คเกจ</h3>
              <div>
                ${pkg.includedSections.map(sec => `
                  <div class="section-card">
                    <h4>${CW.escape(sec.title)}</h4>
                    <ul>
                      ${(sec.items || []).map(i => `<li>${CW.escape(i)}</li>`).join('')}
                    </ul>
                  </div>
                `).join('')}
              </div>
              ${pkg.overflowPricing?.label ? `<div class="overflow-note">⚠ ${CW.escape(pkg.overflowPricing.label)}</div>` : ''}
              ${pkg.snackOverflow?.label ? `<div class="overflow-note">⚠ ${CW.escape(pkg.snackOverflow.label)}</div>` : ''}
            </div>` : ''}

            ${pkg.freeBonuses && pkg.freeBonuses.length ? `
            <div class="panel">
              <h3><span class="num">4</span> 🎁 ของแถมฟรี</h3>
              <div class="freebonus">
                <h4>${CW.escape(pkg.freeBonusLabel || 'พิเศษ! แถมฟรี')}</h4>
                <ul>${pkg.freeBonuses.map(b => `<li>${CW.escape(b)}</li>`).join('')}</ul>
              </div>
            </div>` : ''}

            ${pkg.rituals && pkg.rituals.length ? `
            <div class="panel">
              <h3><span class="num">${pkg.freeBonuses?.length ? 5 : 4}</span> ตัดพิธีออก = ลดราคา</h3>
              <p style="color:var(--color-text-muted);font-size:0.95rem;">ติ๊กในกล่องคำนวณราคาด้านขวาเพื่อตัดพิธีและลดราคาทันที</p>
              <table class="t">
                <thead><tr><th>พิธี</th><th class="num">ลดราคาเมื่อตัด</th></tr></thead>
                <tbody>${pkg.rituals.map(r => `<tr><td>${CW.escape(r.name)}</td><td class="num">- ${CW.fmtBaht(r.deductIfRemoved)}</td></tr>`).join('')}</tbody>
              </table>
            </div>` : ''}

            ${pkgAddons.length ? `
            <div class="panel">
              <h3><span class="num">${[pkg.freeBonuses?.length, pkg.rituals?.length].filter(Boolean).length + 4}</span> ✨ บริการเสริม (เพิ่มได้ตามต้องการ)</h3>
              <p style="color:var(--color-text-muted);font-size:0.95rem;">บริการเสริมสำหรับแพ็คเกจนี้ — เลือกได้หลายรายการ</p>
              <div style="display:grid; grid-template-columns: 1fr; gap: 10px;">
                ${pkgAddons.map(a => `
                  <div style="background: var(--color-cream); padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--color-line); display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;">
                    <div>
                      <strong>${CW.escape(a.name)}</strong>
                      <div style="font-size:0.85rem; color: var(--color-text-muted);">${CW.escape(a.description || '')}</div>
                    </div>
                    <div style="text-align:right; min-width: 120px;">
                      <div style="color: var(--color-gold-dark); font-weight: 500;">+ ${CW.fmtBaht(a.price)}</div>
                      <div style="font-size:0.75rem; color: var(--color-text-muted);">ต่อ ${CW.escape(a.unit || 'รายการ')}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>` : ''}

            ${menuOpts.length ? `
            <div class="panel">
              <h3><span class="num">${[pkgAddons.length, pkg.freeBonuses?.length, pkg.rituals?.length].filter(Boolean).length + 4}</span> 🍽️ เมนูอาหาร</h3>
              ${pkg.allowedMenuSetIds?.length ? `<p style="color:var(--color-gold-dark);font-size:0.9rem;">⚡ แพ็คเกจนี้รองรับเฉพาะเซตที่กำหนด</p>` : ''}
              <div style="display:flex;flex-wrap:wrap;gap:12px;">
                ${menuOpts.map(opt => `
                  <a href="../menu/?type=${encodeURIComponent(opt.key)}" class="card" style="flex:1 1 220px;text-decoration:none;color:inherit;">
                    <div class="card__img" style="aspect-ratio:4/3;"><img src="${CW.escape(opt.menu.image)}" alt="${CW.escape(opt.menu.name)}" loading="lazy"></div>
                    <div class="card__body" style="padding:16px;">
                      <h4 style="margin:0 0 4px;">${opt.menu.icon || ''} ${CW.escape(opt.menu.name)}</h4>
                      <div style="font-size:0.8rem;color:var(--color-text-muted);margin:0;">
                        ${opt.sets.map(s => `${CW.escape(s.name)} (${priceLabel(s)})`).join('<br>')}
                      </div>
                    </div>
                  </a>
                `).join('')}
              </div>
            </div>` : ''}

            ${pkg.customerProvides && pkg.customerProvides.length ? `
            <div class="customer-provides">
              <h4>📋 สิ่งที่เจ้าภาพต้องเตรียมเอง</h4>
              <ul>${pkg.customerProvides.map(c => `<li>${CW.escape(c)}</li>`).join('')}</ul>
            </div>` : ''}
          </div>

          <!-- RIGHT: price calculator -->
          <div>
            <div class="price-box" id="priceBox">
              <h4>คำนวณราคา</h4>

              ${slots.length > 1 ? `
              <div class="field" style="margin-bottom:12px;">
                <label style="color:#FFFCF7;opacity:0.85;">ช่วงเวลา</label>
                <select id="slotSelect" style="background: rgba(255,255,255,0.95); color: var(--color-text);">
                  ${slots.map(s => `<option value="${CW.escape(s.id)}">${CW.escape(s.name)} (${CW.escape(s.hours)})</option>`).join('')}
                </select>
              </div>` : (slots.length === 1 ? `
              <div style="font-size:0.85rem; color: var(--color-gold-light); margin-bottom: 12px;">
                ⏰ ${CW.escape(slots[0].name)} · ${CW.escape(slots[0].hours)}
              </div>` : '')}

              <div class="field" style="margin-bottom:12px;">
                <label style="color:#FFFCF7;opacity:0.85;">จำนวนแขก (เริ่ม ${guestBase})</label>
                <select id="guestSelect" style="background: rgba(255,255,255,0.95);color:var(--color-text)">
                  ${(data.guestCountTiers || []).filter(n => n >= guestBase).map(n =>
                    `<option value="${n}" ${n === guestBase ? 'selected' : ''}>${n} ท่าน</option>`).join('')}
                </select>
              </div>

              ${(pkg.overflowPricing?.buffet || pkg.overflowPricing?.chinese || pkg.overflowPricing?.thai) ? `
              <div class="field" id="overflowMenuField" style="margin-bottom:12px; display:none;">
                <label style="color:#FFFCF7;opacity:0.85;">ประเภทเมนู (สำหรับคำนวณคนเกิน)</label>
                <select id="overflowMenuSelect" style="background: rgba(255,255,255,0.95); color: var(--color-text);">
                  ${pkg.overflowPricing?.buffet ? `<option value="buffet">บุฟเฟต์ (+${pkg.overflowPricing.buffet.perPerson}/ท่าน)</option>` : ''}
                  ${pkg.overflowPricing?.chinese ? `<option value="chinese">โต๊ะจีน (+${pkg.overflowPricing.chinese.perTable}/โต๊ะ ${pkg.overflowPricing.chinese.tableSize}ท่าน)</option>` : ''}
                  ${pkg.overflowPricing?.thai ? `<option value="thai">โต๊ะจันทร์ (+${pkg.overflowPricing.thai.perTable}/โต๊ะ ${pkg.overflowPricing.thai.tableSize}ท่าน)</option>` : ''}
                </select>
              </div>` : ''}

              ${pkg.crossYearDiscount ? `
              <div style="background:rgba(216,180,115,0.15);padding:10px 12px;border-radius:8px;margin-bottom:12px;border:1px solid var(--color-gold-light);">
                <label style="display:flex;gap:8px;cursor:pointer;align-items:center;">
                  <input type="checkbox" id="crossYearChk" style="accent-color:var(--color-gold-light);">
                  <span>จองข้ามปี <span style="color:var(--color-gold-light);">- ${CW.fmtBaht(pkg.crossYearDiscount)}</span></span>
                </label>
              </div>` : ''}

              <hr>
              <div class="price-meta">ราคาฐาน (${guestBase} ท่าน)</div>
              <div class="price-num" id="basePriceShow" style="font-size:1.5rem;">-</div>

              <div id="overflowRow" style="display:none;">
                <hr>
                <div class="price-meta">ส่วนเกิน <span id="overflowCount">0</span> ท่าน</div>
                <div class="price-num" id="overflowAmount" style="font-size:1.2rem;color:var(--color-gold-light);">-</div>
              </div>

              <div id="crossYearRow" style="display:none;">
                <hr>
                <div class="price-meta">ส่วนลดจองข้ามปี</div>
                <div class="price-num" id="crossYearAmount" style="font-size:1.2rem;color:var(--color-gold-light);">-</div>
              </div>

              ${pkg.rituals?.length ? `
                <hr>
                <div class="price-meta" style="margin-bottom:8px;">ตัดพิธี</div>
                ${pkg.rituals.map(r => `
                  <label style="display:flex;align-items:center;gap:10px;padding:4px 0;">
                    <input type="checkbox" data-ritual="${escapeAttr(r.id)}" data-deduct="${r.deductIfRemoved}">
                    <span style="flex:1;font-size:0.88rem;">${CW.escape(r.name)}</span>
                    <span style="color:var(--color-gold-light);font-size:0.85rem;">- ${CW.fmtPrice(r.deductIfRemoved)}฿</span>
                  </label>
                `).join('')}
              ` : ''}

              <hr>
              <div class="price-meta">รวมสุทธิ</div>
              <div class="price-num" id="totalPrice" style="color: var(--color-gold-light);">-</div>

              ${data.site?.contact?.line ? `<a class="btn btn--primary btn--block mt-md" href="${CW.escape(data.site.contact.line.startsWith('http') ? data.site.contact.line : 'https://line.me/R/ti/p/' + encodeURIComponent(data.site.contact.line))}" target="_blank">💬 จอง/สอบถามผ่าน LINE</a>` : ''}
              ${data.site?.contact?.phone ? `<a class="btn ${data.site?.contact?.line ? 'btn--ghost' : 'btn--primary'} btn--block mt-md" href="tel:${CW.escape(data.site.contact.phone.replace(/[^\\d+]/g, ''))}" style="${data.site?.contact?.line ? 'border-color:rgba(255,255,255,0.4);color:#fff;' : ''}">☎ ${CW.escape(data.site.contact.phone)}</a>` : ''}
              ${data.site?.contact?.facebook ? `<a class="btn btn--ghost btn--block mt-md" href="${CW.escape(data.site.contact.facebook)}" target="_blank" style="border-color:rgba(255,255,255,0.4);color:#fff;">f Facebook</a>` : ''}
            </div>
          </div>
        </div>
      </div>
    </section>
  `;

  // Wire up calculator
  const slotSel = document.getElementById('slotSelect');
  if (slotSel) slotSel.addEventListener('change', e => { timeSlot = e.target.value; recalc(); });
  document.getElementById('guestSelect').addEventListener('change', e => { guestCount = e.target.value; recalc(); });
  const overflowMenuSel = document.getElementById('overflowMenuSelect');
  if (overflowMenuSel) overflowMenuSel.addEventListener('change', recalc);
  const cyChk = document.getElementById('crossYearChk');
  if (cyChk) cyChk.addEventListener('change', e => { crossYear = e.target.checked; recalc(); });
  document.querySelectorAll('#priceBox [data-ritual]').forEach(cb => cb.addEventListener('change', recalc));

  function recalc() {
    const base = pkg.basePricing?.[timeSlot]?.[season] ?? 0;
    let total = base;

    // Overflow
    const guests = Number(guestCount);
    const extra = Math.max(0, guests - guestBase);
    const overflowField = document.getElementById('overflowMenuField');
    const overflowRow = document.getElementById('overflowRow');
    let overflowAmt = 0;
    let overflowCountText = '';
    if (extra > 0 && pkg.overflowPricing) {
      const op = pkg.overflowPricing;
      const has3 = op.buffet || op.chinese || op.thai;
      if (has3) {
        // Need a menu type selector
        if (overflowField) overflowField.style.display = '';
        const choice = overflowMenuSel?.value || (op.buffet ? 'buffet' : (op.chinese ? 'chinese' : 'thai'));
        const rule = op[choice];
        if (rule?.perPerson) {
          overflowAmt = extra * rule.perPerson;
          overflowCountText = `${extra} ท่าน × ${rule.perPerson} = `;
        } else if (rule?.perTable) {
          const tables = Math.ceil(extra / (rule.tableSize || 9));
          overflowAmt = tables * rule.perTable;
          overflowCountText = `${extra} ท่าน → ${tables} โต๊ะ × ${rule.perTable} = `;
        }
      } else if (op.perPerson) {
        overflowAmt = extra * op.perPerson;
        overflowCountText = `${extra} ท่าน × ${op.perPerson} = `;
      } else if (op.thai?.perTable) {
        const tables = Math.ceil(extra / (op.thai.tableSize || 9));
        overflowAmt = tables * op.thai.perTable;
        overflowCountText = `${extra} ท่าน → ${tables} โต๊ะ × ${op.thai.perTable} = `;
      }
    } else {
      if (overflowField) overflowField.style.display = 'none';
    }
    if (overflowAmt > 0) {
      overflowRow.style.display = '';
      document.getElementById('overflowCount').textContent = `(${overflowCountText.trim()})`;
      document.getElementById('overflowAmount').textContent = '+ ' + CW.fmtBaht(overflowAmt);
    } else {
      overflowRow.style.display = 'none';
    }
    total += overflowAmt;

    // Cross-year discount
    const cyRow = document.getElementById('crossYearRow');
    if (crossYear && pkg.crossYearDiscount) {
      total -= pkg.crossYearDiscount;
      if (cyRow) {
        cyRow.style.display = '';
        document.getElementById('crossYearAmount').textContent = '- ' + CW.fmtBaht(pkg.crossYearDiscount);
      }
    } else if (cyRow) {
      cyRow.style.display = 'none';
    }

    // Rituals
    document.querySelectorAll('#priceBox [data-ritual]:checked').forEach(cb => {
      total -= Number(cb.dataset.deduct || 0);
    });

    document.getElementById('basePriceShow').textContent = CW.fmtBaht(base);
    document.getElementById('totalPrice').textContent = CW.fmtBaht(Math.max(0, total));
  }
  recalc();
})();
</script>

</body>
</html>
