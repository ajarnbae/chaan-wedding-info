<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แพ็คเกจ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  .promo-card { position: relative; }
  .promo-card::before {
    content: "🔥 PROMO";
    position: absolute;
    top: 12px; left: 12px;
    z-index: 2;
    background: var(--color-rose);
    color: #fff;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
  }
</style>
</head>
<body>

<div id="nav-mount"></div>

<section class="section">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span> แพ็คเกจ</div>
    <div class="section-title">
      <span class="eyebrow">Our Packages</span>
      <h2>แพ็คเกจทั้งหมด</h2>
      <p class="text-center" style="color:var(--color-text-muted); max-width: 720px; margin: 16px auto 0;">
        เลือกหมวดและฤดูกาลด้านล่าง · แต่ละแพ็คเกจสามารถปรับ <strong>ช่วงเวลา</strong>, <strong>จำนวนแขก</strong>, และคำนวณค่าใช้จ่ายต่าง ๆ ได้
      </p>
    </div>

    <!-- Tabs (wedding / seminar) -->
    <div class="text-center" style="margin-bottom: 16px;">
      <div class="toggle" id="catToggle">
        <button data-cat="wedding" class="active">งานแต่งงาน</button>
        <button data-cat="seminar">งานสัมมนา</button>
      </div>
    </div>

    <!-- Season toggle (hidden for seminar) -->
    <div class="text-center" style="margin-bottom: var(--space-xl);" id="seasonWrap">
      <div class="toggle" id="seasonToggle">
        <button data-season="low">โปรร้อนนี้ (พ.ค. - ก.ค.)</button>
        <button data-season="high" class="active">High Season (ส.ค. - มี.ค.)</button>
      </div>
    </div>

    <div id="packagesGrid" class="grid grid--auto">
      <div class="loading">กำลังโหลด...</div>
    </div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="../js/common.js"></script>
<script>
(async function() {
  const data = await CW.mountChrome('packages');
  if (!data) return;
  let season = CW.currentSeason(data.seasonInfo);
  let category = 'wedding';

  document.querySelectorAll('#seasonToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.season === season);
    b.addEventListener('click', () => {
      season = b.dataset.season;
      document.querySelectorAll('#seasonToggle button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });

  document.querySelectorAll('#catToggle button').forEach(b => {
    b.addEventListener('click', () => {
      category = b.dataset.cat;
      document.querySelectorAll('#catToggle button').forEach(x => x.classList.toggle('active', x === b));
      document.getElementById('seasonWrap').style.display = (category === 'seminar') ? 'none' : '';
      render();
    });
  });

  function render() {
    const seasonForList = (category === 'seminar') ? 'high' : season;
    // For wedding: include packages with season=="all" or matching season
    const list = (data.packages?.[category] || []).filter(p =>
      !p.season || p.season === 'all' || p.season === seasonForList
    );
    const slots = data.timeSlots?.[category] || [];
    const grid = document.getElementById('packagesGrid');
    if (!list.length) {
      grid.innerHTML = `<div class="empty-state">ไม่มีแพ็คเกจในช่วงนี้</div>`;
      return;
    }
    grid.innerHTML = list.map(p => {
      const primarySlot = (p.availableTimeSlots && p.availableTimeSlots[0]) || slots[0]?.id;
      const guestBase = p.guestBase || 100;
      const price = p.basePricing?.[primarySlot]?.[seasonForList] ?? 0;
      const promoCls = p.isPromo ? ' promo-card' : '';
      const featBadge = p.isFeatured ? '<span class="badge badge--gold">⭐ Featured</span>' : '';
      const seasonAllBadge = p.season === 'all' ? '<span class="badge badge--green">ใช้ได้ทั้งปี</span>' : '';
      const crossYear = p.crossYearDiscount ? `<span style="font-size:0.75rem;color:var(--color-success);">จองข้ามปี ${CW.fmtBaht(price - p.crossYearDiscount)}</span>` : '';
      return `
        <a href="./detail.html?id=${encodeURIComponent(p.id)}" class="card${promoCls}" style="text-decoration:none;color:inherit;">
          <div class="card__img"><img src="${CW.escape(p.image)}" alt="${CW.escape(p.name)}" loading="lazy"></div>
          <div class="card__body">
            <span class="card__tag">${category === 'wedding' ? 'งานแต่งงาน' : 'สัมมนา'}</span>
            <h3 class="card__title">${CW.escape(p.name)} ${featBadge}${seasonAllBadge}</h3>
            <p class="card__subtitle">${CW.escape(p.subtitle || '')}</p>
            <p class="card__desc">${CW.escape(p.shortDescription || '')}</p>
            <div class="card__price">
              ${CW.fmtBaht(price)}
              <small>เริ่ม ${guestBase} ท่าน · ${(p.availableTimeSlots || []).length} ช่วงเวลา</small>
              ${crossYear ? '<small>' + crossYear + '</small>' : ''}
            </div>
            <div class="card__actions"><span class="btn btn--ghost btn--sm">ดูรายละเอียด →</span></div>
          </div>
        </a>`;
    }).join('');
  }
  render();
})();
</script>

</body>
</html>
