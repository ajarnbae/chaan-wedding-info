<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แพ็คเกจ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css?v=20260612b">
<style>
  /* ================================================
     Packages — editorial theme (เข้าชุดหน้าแรก รอบ 4)
     ================================================ */

  .dhead__en {
    font-family: var(--font-serif);
    font-size: clamp(2.3rem, 5.4vw, 3.9rem);
    font-weight: 400;
    line-height: 1.04;
    letter-spacing: 0.5px;
    color: var(--color-text);
    margin: 0;
  }
  .dhead__en em { font-style: italic; }
  .dhead__th {
    font-family: var(--font-sans);
    font-size: clamp(0.95rem, 1.6vw, 1.1rem);
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--color-text-muted);
    margin: 12px 0 0;
  }
  .page-head { margin: clamp(14px, 3vw, 28px) 0 clamp(36px, 5vw, 56px); }
  .page-head__intro {
    color: var(--color-text-muted);
    max-width: 640px;
    margin: 18px 0 0;
    line-height: 1.9;
    font-size: 0.95rem;
  }
  .toggle-row { margin-bottom: 20px; }

  /* ── toggles → text tabs (override global pill) ── */
  .toggle {
    border: none;
    background: transparent;
    padding: 0;
    border-radius: 0;
    display: inline-flex;
    gap: clamp(18px, 3vw, 32px);
    border-bottom: 1px solid var(--color-line);
  }
  .toggle button {
    padding: 10px 2px 14px;
    min-height: 48px;
    border-radius: 0;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--color-text-muted);
    transition: color 0.25s ease, border-color 0.25s ease;
  }
  .toggle button:hover { color: var(--color-brown-dark); }
  .toggle button.active {
    background: transparent;
    color: var(--color-brown-dark);
    border-bottom-color: var(--color-gold);
  }

  /* ── Tier toggle (Essential / Signature) — segmented hairline ── */
  .tier-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    max-width: 680px;
    border: 1px solid var(--color-line);
    background: transparent;
  }
  .tier-toggle button {
    background: transparent;
    border: none;
    border-left: 1px solid var(--color-line);
    padding: clamp(12px, 2.5vw, 18px) clamp(12px, 3vw, 26px);
    min-width: 0;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: background 0.25s ease, box-shadow 0.25s ease;
  }
  .tier-toggle button:first-child { border-left: none; }
  .tier-toggle button.active {
    background: var(--color-ivory);
    box-shadow: inset 0 -2px 0 var(--color-gold);
  }
  .tier-toggle button .tier-name {
    display: block;
    font-family: var(--font-serif);
    font-size: clamp(0.95rem, 2.4vw, 1.15rem);
    font-weight: 500;
    color: var(--color-text);
  }
  .tier-toggle button.active .tier-name { color: var(--color-gold-dark); }
  .tier-toggle button .tier-cond {
    display: block;
    margin-top: 4px;
    font-size: clamp(0.6rem, 1.8vw, 0.78rem);
    color: var(--color-text-muted);
    line-height: 1.5;
  }

  /* ── PAGE HERO — wordmark เกยภาพ (ทุกหน้าแบบ Hillbrook) ── */
  .phero { position: relative; height: clamp(300px, 52vh, 560px); }
  .phero__media { position: absolute; inset: 0; overflow: hidden; background: var(--color-line); }
  .phero__media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .phero__media::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(30,18,8,0.22) 0%, rgba(30,18,8,0.08) 55%, rgba(30,18,8,0.25) 100%);
  }
  .phero__wordmark {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    transform: translateY(44%);
    z-index: 2;
    text-align: center;
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(52px, 12.5vw, 200px);
    line-height: 0.74;
    letter-spacing: 0.05em;
    color: var(--color-cream);
    pointer-events: none;
    user-select: none;
  }
  .pintro {
    max-width: 1240px;
    margin: 0 auto;
    padding: clamp(84px, 11vw, 170px) clamp(20px, 5vw, 64px) clamp(36px, 5vw, 64px);
  }
  .pintro__body {
    max-width: 600px;
    margin: clamp(22px, 3vw, 34px) 0 0;
    color: var(--color-text-muted);
    line-height: 1.95;
    font-size: 0.95rem;
  }
  .pintro__body p { margin: 0; }

  .lnk {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-sans);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--color-text);
    min-height: 44px;
    transition: color 0.3s ease;
  }
  .circ {
    width: 26px; height: 26px;
    flex-shrink: 0;
    border: 1px solid var(--color-gold);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--color-gold);
    font-size: 0.8rem;
    transition: background 0.3s ease, color 0.3s ease, transform 0.3s ease;
  }
  .pk:hover .circ, .lnk:hover .circ { background: var(--color-gold); color: #fff; transform: translateX(4px); }

  /* ── package items — unboxed editorial (Hillbrook services) ── */
  .pk {
    display: flex;
    flex-direction: column;
    color: inherit;
    text-decoration: none;
  }
  .pk:hover { color: inherit; }
  .pk__img {
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: var(--color-line);
    margin-bottom: 20px;
  }
  .pk__img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transform: scale(1.001);
    transition: transform 1.2s ease;
  }
  .pk:hover .pk__img img { transform: scale(1.04); }
  .pk__kicker {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--color-gold-dark);
    margin-bottom: 8px;
  }
  .pk__title {
    font-family: var(--font-serif);
    font-size: clamp(1.4rem, 2.4vw, 1.75rem);
    font-weight: 400;
    color: var(--color-text);
    line-height: 1.25;
    margin: 0 0 4px;
  }
  .pk__sub {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 0.98rem;
    color: var(--color-gold-dark);
    margin: 0 0 10px;
  }
  .pk__desc {
    font-size: 0.9rem;
    color: var(--color-text-muted);
    line-height: 1.8;
    margin: 0 0 16px;
    flex: 1;
  }
  .pk__price {
    font-family: var(--font-serif);
    font-size: 1.45rem;
    color: var(--color-text);
    border-top: 1px solid var(--color-line);
    padding-top: 14px;
    margin-bottom: 14px;
    line-height: 1.2;
  }
  .pk__price small {
    display: block;
    font-family: var(--font-sans);
    font-size: 0.8rem;
    color: var(--color-text-muted);
    margin-top: 5px;
  }
  .pk__price .cy {
    display: block;
    font-family: var(--font-sans);
    font-size: 0.78rem;
    color: var(--color-success);
    margin-top: 3px;
  }

  /* controls row */
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: clamp(24px, 4vw, 48px);
    margin-bottom: clamp(30px, 4vw, 44px);
  }

  /* ── unified page grid: ทุกชั้นกว้างเท่ากัน (symmetry แบบ Hillbrook) ── */
  .section .container {
    max-width: 1240px;
    padding: 0 clamp(20px, 5vw, 64px);
  }
  #packagesGrid {
    gap: clamp(44px, 6vw, 68px) clamp(20px, 3vw, 44px);
  }
  @media (min-width: 640px) { #packagesGrid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 980px) { #packagesGrid { grid-template-columns: repeat(3, 1fr); } }

  /* ── Tier summary strip — hairline rows ── */
  .tier-strip {
    margin: var(--space-xl) auto 0;
    max-width: 760px;
    background: transparent;
    border-top: 1px solid var(--color-brown);
    padding: 18px 2px 4px;
  }
  .tier-strip h4 {
    margin: 0 0 8px;
    font-family: var(--font-serif);
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--color-text);
  }
  .tier-strip .srow {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--color-line);
    font-size: 0.85rem;
  }
  .tier-strip .srow:last-child { border-bottom: none; }
  .tier-strip .srow .lbl { color: var(--color-text); }
  .tier-strip .srow .val { text-align: right; }
  .val--muted { color: #A99A85; }
  .val--gold { color: var(--color-gold-dark); font-weight: 500; }
  .val--green { color: var(--color-success); font-weight: 500; }
  .val--plain { color: var(--color-text); }

  /* ── Compare table (apple.com/compare style) ── */
  .compare-wrap { max-width: 880px; margin: 0 auto; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .compare-table { min-width: 540px; }
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
    background: transparent;
  }
  .compare-table th, .compare-table td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--color-line);
    vertical-align: top;
  }
  .compare-table col.c-label { width: 38%; }
  .compare-table col.c-tier { width: 31%; }
  .compare-table thead th {
    text-align: center;
    border-bottom: 1px solid var(--color-brown);
    padding-bottom: 16px;
  }
  .compare-table thead th .t-name {
    display: block;
    font-family: var(--font-serif);
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--color-text);
  }
  .compare-table thead th .t-cond {
    display: block;
    margin-top: 4px;
    font-size: 0.74rem;
    font-weight: 400;
    color: var(--color-text-muted);
    line-height: 1.5;
  }
  .compare-table td.row-label { text-align: left; color: var(--color-text); }
  .compare-table td.cell { text-align: center; }
  .compare-table .sig-col { background: var(--color-cream-warm); }
  .compare-table tr.section-row td {
    border-bottom: none;
    padding: 28px 16px 6px;
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 1.05rem;
    text-align: left;
  }
  .compare-table tr.section-row:first-child td { padding-top: 6px; }
  .compare-table .price-main { font-family: var(--font-serif); font-weight: 600; font-size: 1.02rem; }
  .compare-table .price-cy {
    display: block;
    margin-top: 3px;
    font-size: 0.74rem;
    color: var(--color-success);
  }
  .compare-table .mark-yes { color: var(--color-success); font-weight: 700; }
  .compare-table .mark-no { color: #C9BFB1; }
</style>
</head>
<body>

<div id="nav-mount"></div>

<!-- PAGE HERO -->
<section class="phero">
  <div class="phero__media"><img id="pheroImg" alt="แพ็คเกจ Chaan Wedding"></div>
  <div class="phero__wordmark" aria-hidden="true">PACKAGES</div>
</section>

<!-- INTRO -->
<section class="pintro">
  <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span> แพ็คเกจ</div>
  <h2 class="dhead__en"><em>Our</em> Packages</h2>
  <p class="dhead__th">แพ็คเกจทั้งหมด</p>
  <div class="pintro__body">
    <p>เลือกระดับแพ็คเกจด้านล่าง หรือกด <strong>เปรียบเทียบแพ็คเกจ</strong> เพื่อดูตารางเทียบทุกรายการ</p>
  </div>
</section>

<section class="section" style="padding-top: 0;">
  <div class="container">
    <!-- Mode tabs: แถวเดียว 3 โหมด -->
    <div class="controls">
      <div class="toggle" id="modeToggle">
        <button data-mode="wedding" class="active">งานแต่งงาน</button>
        <button data-mode="compare">เปรียบเทียบแพ็คเกจ</button>
        <button data-mode="seminar">งานสัมมนา</button>
      </div>
    </div>

    <!-- Tier toggle: Essential / Signature (card view only) -->
    <div class="toggle-row" style="margin-bottom: var(--space-xl);" id="tierWrap">
      <div class="tier-toggle" id="tierToggle">
        <button data-tier="essential" class="active">
          <span class="tier-name">Essential จันทร์คุ้มครบ</span>
          <span class="tier-cond">เม.ย.–ก.ค. ใช้ได้ทุกวัน · เดือนอื่น จันทร์–ศุกร์</span>
        </button>
        <button data-tier="signature">
          <span class="tier-name">Signature จันทร์ครบเครื่อง</span>
          <span class="tier-cond">ใช้ได้ทุกวัน ทั้งปี · ลด 20,000 เมื่อจองข้ามปี</span>
        </button>
      </div>
    </div>

    <div id="packagesGrid" class="grid grid--auto">
      <div class="loading">กำลังโหลด...</div>
    </div>

    <div id="tierStrip"></div>

    <div id="compareMount" hidden></div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="../js/common.js?v=20260612b"></script>
<script>
(async function() {
  const data = await CW.mountChrome('packages');
  if (!data) return;

  // page hero — รูปจากแพ็คเกจแนะนำ (หรือ gallery ภาพแรก)
  const _feat = (data.packages?.wedding || []).find(p => p.id === data.featuredPackageId);
  const _heroImg = document.getElementById('pheroImg');
  const _heroSrc = _feat?.image || data.gallery?.photos?.[0]?.url || '';
  if (_heroSrc) { _heroImg.src = _heroSrc; if (_feat) _heroImg.style.cssText = CW.imgStyle(_feat); }

  let mode = 'wedding';
  let category = 'wedding';
  let tier = 'essential';

  const $ = id => document.getElementById(id);
  const tierOf = p => p.tier || (p.id.startsWith('signature_') ? 'signature' : 'essential');
  const priceOf = p => {
    const slot = (p.availableTimeSlots && p.availableTimeSlots[0]) || (data.timeSlots?.[category] || [])[0]?.id;
    return p.basePricing?.[slot]?.high ?? p.basePricing?.[slot]?.low ?? 0;
  };

  const TIER_META = {
    essential: { label: 'Essential จันทร์คุ้มครบ', cond: 'เม.ย.–ก.ค. ใช้ได้ทุกวัน · เดือนอื่น จันทร์–ศุกร์' },
    signature: { label: 'Signature จันทร์ครบเครื่อง', cond: 'ใช้ได้ทุกวัน ทั้งปี · ลด 20,000 เมื่อจองข้ามปี' }
  };

  // feature rows: label / essential value / signature value
  // c: muted (greyed, shown as — in compare) | gold | green | plain
  const FEATURES = [
    { label: 'อาหารเช้า',
      e: { t: 'ไม่รวม', c: 'muted' },
      s: { t: '✓ บุฟเฟต์ 50 ท่าน', c: 'green' } },
    { label: 'สีดอกไม้',
      e: { t: 'เปลี่ยนได้ +10,000', c: 'gold' },
      s: { t: '✓ เปลี่ยนได้ฟรี', c: 'green' } },
    { label: 'โครงฉากหลัง',
      e: { t: 'เปลี่ยนได้ +17,000', c: 'gold' },
      s: { t: '✓ เปลี่ยนได้ 4 แบบ ฟรี', c: 'green' } },
    { label: 'ดรายไอซ์ / บับเบิ้ล',
      e: { t: 'add-on +5,000 / +3,000', c: 'gold' },
      s: { t: '✓ รวมอยู่แล้ว', c: 'green' } },
    { label: 'ผ้าโต๊ะ, ป้าย, ผ้าคลุมเก้าอี้',
      e: { t: 'ไม่รวม', c: 'muted' },
      s: { t: '✓ รวมอยู่แล้ว', c: 'green' } },
    { label: 'อาหารเลี้ยง',
      e: { t: 'โต๊ะไทยอย่างเดียว', c: 'plain' },
      s: { t: '✓ บุฟเฟต์ / โต๊ะไทย / โต๊ะจีน', c: 'green' } }
  ];

  // ── toggle wiring ──
  document.querySelectorAll('#modeToggle button').forEach(b => {
    b.addEventListener('click', () => {
      mode = b.dataset.mode;
      document.querySelectorAll('#modeToggle button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });
  document.querySelectorAll('#tierToggle button').forEach(b => {
    b.addEventListener('click', () => {
      tier = b.dataset.tier;
      document.querySelectorAll('#tierToggle button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });

  // ── card view ──
  function cardHTML(p) {
    const price = priceOf(p);
    const guestBase = p.guestBase || 100;
    const tierTag = category === 'wedding' ? (tierOf(p) === 'signature' ? 'Signature' : 'Essential') : 'สัมมนา';
    const featBadge = p.isFeatured ? ' · ⭐ Featured' : '';
    const crossYear = p.crossYearDiscount
      ? `<span class="cy">จองข้ามปี ${CW.fmtBaht(price - p.crossYearDiscount)}</span>`
      : '';
    return `
      <a href="./detail.html?id=${encodeURIComponent(p.id)}" class="pk">
        <div class="pk__img"><img src="${CW.escape(p.image)}" alt="${CW.escape(p.name)}" loading="lazy" style="${CW.imgStyle(p)}"></div>
        <span class="pk__kicker">${tierTag}${featBadge}</span>
        <h3 class="pk__title">${CW.escape(p.name)}</h3>
        <p class="pk__sub">${CW.escape(p.subtitle || '')}</p>
        <p class="pk__desc">${CW.escape(p.shortDescription || '')}</p>
        <div class="pk__price">
          ${CW.fmtBaht(price)}
          <small>เริ่ม ${guestBase} ท่าน · ${(p.availableTimeSlots || []).length} ช่วงเวลา</small>
          ${crossYear}
        </div>
        <span class="lnk">ดูรายละเอียด <span class="circ">→</span></span>
      </a>`;
  }

  function renderCards(list) {
    const grid = $('packagesGrid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state">ไม่มีแพ็คเกจในหมวดนี้</div>';
      $('tierStrip').innerHTML = '';
      return;
    }
    grid.innerHTML = list.map(cardHTML).join('');

    // tier summary strip — row-based: label left / value right
    if (category !== 'wedding') { $('tierStrip').innerHTML = ''; return; }
    const side = tier === 'signature' ? 's' : 'e';
    $('tierStrip').innerHTML = `
      <div class="tier-strip">
        <h4>สรุปรายการ — ${TIER_META[tier].label}</h4>
        ${FEATURES.map(f => `
          <div class="srow">
            <span class="lbl">${CW.escape(f.label)}</span>
            <span class="val val--${f[side].c}">${CW.escape(f[side].t)}</span>
          </div>`).join('')}
      </div>`;
  }

  // ── compare view: 2-tier columns, apple.com/compare style ──
  function renderCompare(list) {
    const ess = list.filter(p => tierOf(p) === 'essential');
    const sig = list.filter(p => tierOf(p) === 'signature');

    // price rows: one row per package name, value per tier
    const names = [];
    list.forEach(p => { if (!names.includes(p.name)) names.push(p.name); });
    const priceCell = (p, isSig) => {
      if (!p) return `<td class="cell${isSig ? ' sig-col' : ''}"><span class="mark-no">—</span></td>`;
      const price = priceOf(p);
      const cy = p.crossYearDiscount
        ? `<span class="price-cy">จองข้ามปี ${CW.fmtBaht(price - p.crossYearDiscount)} (ลด ${CW.fmtBaht(p.crossYearDiscount)})</span>`
        : '';
      return `<td class="cell${isSig ? ' sig-col' : ''}"><span class="price-main">${CW.fmtBaht(price)}</span>${cy}</td>`;
    };
    const priceRows = names.map(n => {
      const pe = ess.find(p => p.name === n);
      const ps = sig.find(p => p.name === n);
      return `
        <tr>
          <td class="row-label">${CW.escape(n)}</td>
          ${priceCell(pe, false)}
          ${priceCell(ps, true)}
        </tr>`;
    }).join('');

    // feature rows: muted → dash, others → text in tier color
    const featCell = (v, isSig) => {
      const inner = v.c === 'muted'
        ? '<span class="mark-no">—</span>'
        : `<span class="${v.c === 'green' ? 'mark-yes' : (v.c === 'gold' ? 'val--gold' : '')}" style="font-weight:${v.c === 'plain' ? '400' : '500'};">${CW.escape(v.t)}</span>`;
      return `<td class="cell${isSig ? ' sig-col' : ''}">${inner}</td>`;
    };
    const featRows = FEATURES.map(f => `
      <tr>
        <td class="row-label">${CW.escape(f.label)}</td>
        ${featCell(f.e, false)}
        ${featCell(f.s, true)}
      </tr>`).join('');

    $('compareMount').innerHTML = `
      <div class="compare-wrap">
        <table class="compare-table">
          <colgroup>
            <col class="c-label"><col class="c-tier"><col class="c-tier">
          </colgroup>
          <thead>
            <tr>
              <th></th>
              <th>
                <span class="t-name">Essential จันทร์คุ้มครบ</span>
                <span class="t-cond">${CW.escape(TIER_META.essential.cond)}</span>
              </th>
              <th class="sig-col">
                <span class="t-name">Signature จันทร์ครบเครื่อง</span>
                <span class="t-cond">${CW.escape(TIER_META.signature.cond)}</span>
              </th>
            </tr>
          </thead>
          <tbody>
            <tr class="section-row"><td colspan="3">ราคา</td></tr>
            ${priceRows}
            <tr>
              <td class="row-label">วันที่ใช้ได้</td>
              <td class="cell" style="font-size:0.78rem;">เม.ย.–ก.ค. ทุกวัน<br>เดือนอื่น จ–ศ</td>
              <td class="cell sig-col" style="font-size:0.78rem;">ทุกวัน ทั้งปี</td>
            </tr>
            <tr>
              <td class="row-label">ส่วนลดจองข้ามปี</td>
              <td class="cell"><span class="mark-no">—</span></td>
              <td class="cell sig-col"><span class="mark-yes">✓ ลด 20,000</span></td>
            </tr>
            <tr class="section-row"><td colspan="3">สิ่งที่รวม</td></tr>
            ${featRows}
          </tbody>
        </table>
        <p class="text-center" style="font-size:0.78rem;color:var(--color-text-muted);margin-top:16px;">
          ดูรายละเอียดเต็มและคำนวณราคาได้ในหน้าแพ็คเกจแต่ละรายการ
        </p>
      </div>`;
  }

  // ── main render: 3 โหมด (งานแต่ง / เปรียบเทียบ / สัมมนา) ──
  function render() {
    category = mode === 'seminar' ? 'seminar' : 'wedding';
    const all = data.packages?.[category] || [];

    $('tierWrap').style.display = mode === 'wedding' ? '' : 'none';

    if (mode === 'compare') {
      $('packagesGrid').style.display = 'none';
      $('tierStrip').innerHTML = '';
      $('compareMount').removeAttribute('hidden');
      renderCompare(data.packages?.wedding || []);
    } else {
      $('compareMount').setAttribute('hidden', '');
      $('compareMount').innerHTML = '';
      $('packagesGrid').style.display = '';
      const list = mode === 'wedding' ? all.filter(p => tierOf(p) === tier) : all;
      renderCards(list);
    }
  }
  render();
})();
</script>

</body>
</html>
