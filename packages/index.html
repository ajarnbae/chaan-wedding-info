<!doctype html>
<html lang="th" data-base="../">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แพ็คเกจ — Chaan Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=Sarabun:wght@300;400;500;600&family=Trirong:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  /* ── Tier toggle (Essential / Signature) ── */
  .tier-toggle {
    display: inline-flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tier-toggle button {
    background: #fff;
    border: 1.5px solid var(--color-border, #E5DDD3);
    border-radius: 14px;
    padding: 14px 22px;
    cursor: pointer;
    text-align: center;
    min-width: 220px;
    transition: border-color .2s, box-shadow .2s, background .2s;
    font-family: inherit;
  }
  .tier-toggle button .tier-name {
    display: block;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--color-text, #3B3026);
  }
  .tier-toggle button .tier-cond {
    display: block;
    margin-top: 4px;
    font-size: 0.78rem;
    color: var(--color-text-muted, #8A7C6C);
    line-height: 1.5;
  }
  .tier-toggle button.active {
    border-color: var(--color-gold, #B8924B);
    background: #FFFDF7;
    box-shadow: 0 4px 14px rgba(184,146,75,.18);
  }
  .tier-toggle button.active .tier-name { color: var(--color-gold-dark, #8C6C2E); }

  /* ── Tier summary strip (row-based) ── */
  .tier-strip {
    margin-top: var(--space-lg, 32px);
    background: var(--color-cream-warm, #F4EBDC);
    border-radius: 14px;
    padding: 16px 24px 10px;
  }
  .tier-strip h4 {
    margin: 0 0 4px;
    font-size: 0.95rem;
    color: var(--color-text, #3B3026);
  }
  .tier-strip .srow {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    padding: 11px 0;
    border-bottom: 0.5px solid rgba(60,48,32,.14);
    font-size: 0.85rem;
  }
  .tier-strip .srow:last-child { border-bottom: none; }
  .tier-strip .srow .lbl { color: var(--color-text, #3B3026); }
  .tier-strip .srow .val { text-align: right; }
  .val--muted { color: #A99A85; }
  .val--gold { color: var(--color-gold-dark, #8C6C2E); font-weight: 500; }
  .val--green { color: var(--color-success, #6B8E5A); font-weight: 500; }
  .val--plain { color: var(--color-text, #3B3026); }

  /* ── Compare table (apple.com/compare style) ── */
  .compare-wrap { max-width: 880px; margin: 0 auto; }
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
    background: transparent;
  }
  .compare-table th, .compare-table td {
    padding: 13px 16px;
    border-bottom: 0.5px solid rgba(60,48,32,.14);
    vertical-align: top;
  }
  .compare-table col.c-label { width: 38%; }
  .compare-table col.c-tier { width: 31%; }
  .compare-table thead th {
    text-align: center;
    border-bottom: 1px solid rgba(60,48,32,.25);
    padding-bottom: 16px;
  }
  .compare-table thead th .t-name {
    display: block;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--color-text, #3B3026);
  }
  .compare-table thead th .t-cond {
    display: block;
    margin-top: 4px;
    font-size: 0.74rem;
    font-weight: 400;
    color: var(--color-text-muted, #8A7C6C);
    line-height: 1.5;
  }
  .compare-table td.row-label {
    text-align: left;
    color: var(--color-text, #3B3026);
  }
  .compare-table td.cell { text-align: center; }
  .compare-table .sig-col { background: var(--color-cream-warm, #F4EBDC); }
  .compare-table tr.section-row td {
    border-bottom: none;
    padding: 28px 16px 6px;
    font-weight: 600;
    font-size: 0.95rem;
    text-align: left;
  }
  .compare-table tr.section-row:first-child td { padding-top: 6px; }
  .compare-table .price-main { font-weight: 600; font-size: 0.95rem; }
  .compare-table .price-cy {
    display: block;
    margin-top: 3px;
    font-size: 0.74rem;
    color: var(--color-success, #6B8E5A);
  }
  .compare-table .mark-yes { color: var(--color-success, #6B8E5A); font-weight: 700; }
  .compare-table .mark-no { color: #C9BFB1; }
</style>
</head>
<body>

<div id="nav-mount"></div>

<section class="section">
  <div class="container">
    <div class="breadcrumb"><a href="../index.html">หน้าแรก</a> <span>/</span> แพ็คเกจ</div>
    <div class="section-title">
      <span class="eyebrow">Our Packages</span>
      <h2>แพ็คเกจทั้งหมด</h2>
      <p class="text-center" style="color:var(--color-text-muted); max-width: 720px; margin: 16px auto 0;">
        เลือกระดับแพ็คเกจด้านล่าง หรือกด <strong>เปรียบเทียบแพ็คเกจ</strong> เพื่อดูตารางเทียบทุกรายการ
      </p>
    </div>

    <!-- Tabs (wedding / seminar) -->
    <div class="text-center" style="margin-bottom: 16px;">
      <div class="toggle" id="catToggle">
        <button data-cat="wedding" class="active">งานแต่งงาน</button>
        <button data-cat="seminar">งานสัมมนา</button>
      </div>
    </div>

    <!-- View toggle: cards / compare (wedding only) -->
    <div class="text-center" style="margin-bottom: 16px;" id="viewWrap">
      <div class="toggle" id="viewToggle">
        <button data-view="cards" class="active">แพ็คเกจทั้งหมด</button>
        <button data-view="compare">เปรียบเทียบแพ็คเกจ</button>
      </div>
    </div>

    <!-- Tier toggle: Essential / Signature (card view only) -->
    <div class="text-center" style="margin-bottom: var(--space-xl);" id="tierWrap">
      <div class="tier-toggle" id="tierToggle">
        <button data-tier="essential" class="active">
          <span class="tier-name">Essential จันทร์คุ้มครบ</span>
          <span class="tier-cond">เม.ย.–ก.ค. ใช้ได้ทุกวัน · เดือนอื่น จันทร์–ศุกร์</span>
        </button>
        <button data-tier="signature">
          <span class="tier-name">Signature จันทร์ครบเครื่อง</span>
          <span class="tier-cond">ใช้ได้ทุกวัน ทั้งปี · ลด 20,000 เมื่อจองข้ามปี</span>
        </button>
      </div>
    </div>

    <div id="packagesGrid" class="grid grid--auto">
      <div class="loading">กำลังโหลด...</div>
    </div>

    <div id="tierStrip"></div>

    <div id="compareMount" hidden></div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="../js/common.js"></script>
<script>
(async function() {
  const data = await CW.mountChrome('packages');
  if (!data) return;

  let category = 'wedding';
  let view = 'cards';
  let tier = 'essential';

  const $ = id => document.getElementById(id);
  const tierOf = p => p.tier || (p.id.startsWith('signature_') ? 'signature' : 'essential');
  const priceOf = p => {
    const slot = (p.availableTimeSlots && p.availableTimeSlots[0]) || (data.timeSlots?.[category] || [])[0]?.id;
    return p.basePricing?.[slot]?.high ?? p.basePricing?.[slot]?.low ?? 0;
  };

  const TIER_META = {
    essential: { label: 'Essential จันทร์คุ้มครบ', cond: 'เม.ย.–ก.ค. ใช้ได้ทุกวัน · เดือนอื่น จันทร์–ศุกร์' },
    signature: { label: 'Signature จันทร์ครบเครื่อง', cond: 'ใช้ได้ทุกวัน ทั้งปี · ลด 20,000 เมื่อจองข้ามปี' }
  };

  // feature rows: label / essential value / signature value
  // c: muted (greyed, shown as — in compare) | gold | green | plain
  const FEATURES = [
    { label: 'อาหารเช้า',
      e: { t: 'ไม่รวม', c: 'muted' },
      s: { t: '✓ บุฟเฟต์ 50 ท่าน', c: 'green' } },
    { label: 'สีดอกไม้',
      e: { t: 'เปลี่ยนได้ +10,000', c: 'gold' },
      s: { t: '✓ เปลี่ยนได้ฟรี', c: 'green' } },
    { label: 'โครงฉากหลัง',
      e: { t: 'เปลี่ยนได้ +17,000', c: 'gold' },
      s: { t: '✓ เปลี่ยนได้ 4 แบบ ฟรี', c: 'green' } },
    { label: 'ดรายไอซ์ / บับเบิ้ล',
      e: { t: 'add-on +5,000 / +3,000', c: 'gold' },
      s: { t: '✓ รวมอยู่แล้ว', c: 'green' } },
    { label: 'ผ้าโต๊ะ, ป้าย, ผ้าคลุมเก้าอี้',
      e: { t: 'ไม่รวม', c: 'muted' },
      s: { t: '✓ รวมอยู่แล้ว', c: 'green' } },
    { label: 'อาหารเลี้ยง',
      e: { t: 'โต๊ะไทยอย่างเดียว', c: 'plain' },
      s: { t: '✓ บุฟเฟต์ / โต๊ะไทย / โต๊ะจีน', c: 'green' } }
  ];

  // ── toggle wiring ──
  document.querySelectorAll('#catToggle button').forEach(b => {
    b.addEventListener('click', () => {
      category = b.dataset.cat;
      document.querySelectorAll('#catToggle button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });
  document.querySelectorAll('#viewToggle button').forEach(b => {
    b.addEventListener('click', () => {
      view = b.dataset.view;
      document.querySelectorAll('#viewToggle button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });
  document.querySelectorAll('#tierToggle button').forEach(b => {
    b.addEventListener('click', () => {
      tier = b.dataset.tier;
      document.querySelectorAll('#tierToggle button').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });

  // ── card view ──
  function cardHTML(p) {
    const price = priceOf(p);
    const guestBase = p.guestBase || 100;
    const featBadge = p.isFeatured ? '<span class="badge badge--gold">⭐ Featured</span>' : '';
    const crossYear = p.crossYearDiscount
      ? `<span style="font-size:0.75rem;color:var(--color-success);">จองข้ามปี ${CW.fmtBaht(price - p.crossYearDiscount)}</span>`
      : '';
    return `
      <a href="./detail.html?id=${encodeURIComponent(p.id)}" class="card" style="text-decoration:none;color:inherit;">
        <div class="card__img"><img src="${CW.escape(p.image)}" alt="${CW.escape(p.name)}" loading="lazy" style="${CW.imgStyle(p)}"></div>
        <div class="card__body">
          <span class="card__tag">${category === 'wedding' ? (tierOf(p) === 'signature' ? 'Signature' : 'Essential') : 'สัมมนา'}</span>
          <h3 class="card__title">${CW.escape(p.name)} ${featBadge}</h3>
          <p class="card__subtitle">${CW.escape(p.subtitle || '')}</p>
          <p class="card__desc">${CW.escape(p.shortDescription || '')}</p>
          <div class="card__price">
            ${CW.fmtBaht(price)}
            <small>เริ่ม ${guestBase} ท่าน · ${(p.availableTimeSlots || []).length} ช่วงเวลา</small>
            ${crossYear ? '<small>' + crossYear + '</small>' : ''}
          </div>
          <div class="card__actions"><span class="btn btn--ghost btn--sm">ดูรายละเอียด →</span></div>
        </div>
      </a>`;
  }

  function renderCards(list) {
    const grid = $('packagesGrid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state">ไม่มีแพ็คเกจในหมวดนี้</div>';
      $('tierStrip').innerHTML = '';
      return;
    }
    grid.innerHTML = list.map(cardHTML).join('');

    // tier summary strip — row-based: label left / value right
    if (category !== 'wedding') { $('tierStrip').innerHTML = ''; return; }
    const side = tier === 'signature' ? 's' : 'e';
    $('tierStrip').innerHTML = `
      <div class="tier-strip">
        <h4>สรุปรายการ — ${TIER_META[tier].label}</h4>
        ${FEATURES.map(f => `
          <div class="srow">
            <span class="lbl">${CW.escape(f.label)}</span>
            <span class="val val--${f[side].c}">${CW.escape(f[side].t)}</span>
          </div>`).join('')}
      </div>`;
  }

  // ── compare view: 2-tier columns, apple.com/compare style ──
  function renderCompare(list) {
    const ess = list.filter(p => tierOf(p) === 'essential');
    const sig = list.filter(p => tierOf(p) === 'signature');

    // price rows: one row per package name, value per tier
    const names = [];
    list.forEach(p => { if (!names.includes(p.name)) names.push(p.name); });
    const priceCell = (p, isSig) => {
      if (!p) return `<td class="cell${isSig ? ' sig-col' : ''}"><span class="mark-no">—</span></td>`;
      const price = priceOf(p);
      const cy = p.crossYearDiscount
        ? `<span class="price-cy">จองข้ามปี ${CW.fmtBaht(price - p.crossYearDiscount)} (ลด ${CW.fmtBaht(p.crossYearDiscount)})</span>`
        : '';
      return `<td class="cell${isSig ? ' sig-col' : ''}"><span class="price-main">${CW.fmtBaht(price)}</span>${cy}</td>`;
    };
    const priceRows = names.map(n => {
      const pe = ess.find(p => p.name === n);
      const ps = sig.find(p => p.name === n);
      return `
        <tr>
          <td class="row-label">${CW.escape(n)}</td>
          ${priceCell(pe, false)}
          ${priceCell(ps, true)}
        </tr>`;
    }).join('');

    // feature rows: muted → dash, others → text in tier color
    const featCell = (v, isSig) => {
      const inner = v.c === 'muted'
        ? '<span class="mark-no">—</span>'
        : `<span class="${v.c === 'green' ? 'mark-yes' : (v.c === 'gold' ? 'val--gold' : '')}" style="font-weight:${v.c === 'plain' ? '400' : '500'};">${CW.escape(v.t)}</span>`;
      return `<td class="cell${isSig ? ' sig-col' : ''}">${inner}</td>`;
    };
    const featRows = FEATURES.map(f => `
      <tr>
        <td class="row-label">${CW.escape(f.label)}</td>
        ${featCell(f.e, false)}
        ${featCell(f.s, true)}
      </tr>`).join('');

    $('compareMount').innerHTML = `
      <div class="compare-wrap">
        <table class="compare-table">
          <colgroup>
            <col class="c-label"><col class="c-tier"><col class="c-tier">
          </colgroup>
          <thead>
            <tr>
              <th></th>
              <th>
                <span class="t-name">Essential จันทร์คุ้มครบ</span>
                <span class="t-cond">${CW.escape(TIER_META.essential.cond)}</span>
              </th>
              <th class="sig-col">
                <span class="t-name">Signature จันทร์ครบเครื่อง</span>
                <span class="t-cond">${CW.escape(TIER_META.signature.cond)}</span>
              </th>
            </tr>
          </thead>
          <tbody>
            <tr class="section-row"><td colspan="3">ราคา</td></tr>
            ${priceRows}
            <tr>
              <td class="row-label">วันที่ใช้ได้</td>
              <td class="cell" style="font-size:0.78rem;">เม.ย.–ก.ค. ทุกวัน<br>เดือนอื่น จ–ศ</td>
              <td class="cell sig-col" style="font-size:0.78rem;">ทุกวัน ทั้งปี</td>
            </tr>
            <tr>
              <td class="row-label">ส่วนลดจองข้ามปี</td>
              <td class="cell"><span class="mark-no">—</span></td>
              <td class="cell sig-col"><span class="mark-yes">✓ ลด 20,000</span></td>
            </tr>
            <tr class="section-row"><td colspan="3">สิ่งที่รวม</td></tr>
            ${featRows}
          </tbody>
        </table>
        <p class="text-center" style="font-size:0.78rem;color:var(--color-text-muted);margin-top:16px;">
          ดูรายละเอียดเต็มและคำนวณราคาได้ในหน้าแพ็คเกจแต่ละรายการ
        </p>
      </div>`;
  }

  // ── main render ──
  function render() {
    const isWedding = category === 'wedding';
    const all = data.packages?.[category] || [];

    $('viewWrap').style.display = isWedding ? '' : 'none';
    const effView = isWedding ? view : 'cards';
    $('tierWrap').style.display = (isWedding && effView === 'cards') ? '' : 'none';

    if (effView === 'compare') {
      $('packagesGrid').style.display = 'none';
      $('tierStrip').innerHTML = '';
      $('compareMount').removeAttribute('hidden');
      renderCompare(all);
    } else {
      $('compareMount').setAttribute('hidden', '');
      $('compareMount').innerHTML = '';
      $('packagesGrid').style.display = '';
      const list = isWedding ? all.filter(p => tierOf(p) === tier) : all;
      renderCards(list);
    }
  }
  render();
})();
</script>

</body>
</html>
